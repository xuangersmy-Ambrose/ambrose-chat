<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMBROSE Health">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#000000">
<meta name="description" content="AI健康陪伴师 - 私人健康顾问 + 健身教练 + 养生管家">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192x192.png">

<!-- Preconnect -->
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://api.moonshot.cn">

<title>AMBROSE - AI Health Coach</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#000;color:#fff;-webkit-overflow-scrolling:touch}
.page{display:none;min-height:100vh;padding-bottom:100px}
.page.show{display:block}

/* 微信兼容 */
.auth{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:#000;z-index:99999}
.auth.hide{display:none}
.logo{width:80px;height:80px;background:linear-gradient(135deg,#00D4FF,#FF2D92);border-radius:20px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:#000;box-shadow:0 4px 20px rgba(0,212,255,0.3)}
h1{font-size:28px;margin-bottom:10px;font-weight:600}
p{color:rgba(255,255,255,0.5);margin-bottom:30px;font-size:15px}
input{width:280px;padding:15px;font-size:17px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;text-align:center;margin-bottom:12px;-webkit-appearance:none;outline:none}
input:focus{border-color:#00D4FF;background:rgba(255,255,255,0.15)}
input.hide{display:none !important}
button{width:280px;padding:16px;font-size:17px;font-weight:600;background:#00D4FF;color:#000;border:none;border-radius:10px;cursor:pointer;-webkit-appearance:none;outline:none}
button:active{opacity:0.8;transform:scale(0.98)}
button:disabled{opacity:0.5}

/* 首页 */
.header{padding:60px 20px 20px}
.time{color:#00D4FF;font-size:14px;margin-bottom:8px;font-weight:500}
.greeting{font-size:32px;font-weight:700;margin-bottom:8px}
.sub{color:rgba(255,255,255,0.5);font-size:15px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
.stat{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);padding:20px;border-radius:16px;text-align:center;cursor:pointer;transition:all 0.2s}
.stat{position:relative;overflow:hidden}.stat::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(0,212,255,0.3);border-radius:50%;transform:translate(-50%,-50%);transition:width 0.3s,height 0.3s,opacity 0.3s;opacity:0}.stat:active::before{width:200%;height:200%;opacity:1;transition:0s}.stat:active{transform:scale(0.96);background:rgba(255,255,255,0.12)}
.stat-num{font-size:28px;font-weight:700;margin-bottom:6px;color:#fff}
.stat-label{font-size:13px;color:rgba(255,255,255,0.5)}
.main-btn{background:#00D4FF;color:#000;padding:18px 24px;margin:20px;border-radius:14px;text-align:center;font-size:17px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,212,255,0.2)}
.main-btn:active{transform:scale(0.96);opacity:0.9}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:12px 0 30px;background:rgba(0,0,0,0.98);border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);z-index:100}
.nav-item{flex:1;text-align:center;padding:8px;cursor:pointer;opacity:0.4;transition:opacity 0.2s}
.nav-item.active{opacity:1}
.nav-item span{display:block;font-size:22px;margin-bottom:2px}
.nav-item small{font-size:11px;font-weight:500}

/* 聊天 */
.chat-header{display:flex;align-items:center;padding:16px 20px;padding-top:50px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.95);position:sticky;top:0;z-index:10}
.back-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;margin-right:12px;border-radius:50%}
.back-btn:active{background:rgba(255,255,255,0.1)}
.chat-title{font-size:17px;font-weight:600}
.chat-status{font-size:13px;color:#30D158;display:flex;align-items:center;gap:6px;margin-top:2px}
.status-dot{width:6px;height:6px;background:#30D158;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(48,209,88,0.4)}50%{opacity:0.8;box-shadow:0 0 0 4px rgba(48,209,88,0)}}
.chat-messages{padding:20px;padding-bottom:140px;min-height:calc(100vh - 200px)}
.msg{margin-bottom:20px;max-width:85%;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{margin-left:auto;text-align:right}
.msg-bubble{display:inline-block;padding:12px 16px;border-radius:20px;font-size:15px;line-height:1.5;word-break:break-word;max-width:100%}
.msg.ai .msg-bubble{background:rgba(255,255,255,0.1);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:#00D4FF;color:#000;border-bottom-right-radius:4px}
.chat-input{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 30px;background:#000;border-top:1px solid rgba(255,255,255,0.08);display:flex;gap:10px;z-index:20}
.chat-input input{flex:1;padding:12px 16px;font-size:15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:24px;color:#fff;margin:0;-webkit-appearance:none;outline:none}
.chat-input input:focus{border-color:#00D4FF}
.chat-input button{width:auto;padding:12px 24px;margin:0;border-radius:24px;font-size:15px}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(40,40,40,0.98);padding:16px 28px;border-radius:12px;color:#fff;font-size:15px;z-index:100000;display:none;text-align:center;max-width:80%}
.toast.show{display:block;animation:toastIn 0.3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-40%)}to{opacity:1;transform:translate(-50%,-50%)}}

/* 微信特殊处理 */
.wechat-tip{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,212,255,0.2);border:1px solid rgba(0,212,255,0.3);padding:8px 16px;border-radius:20px;font-size:13px;color:#00D4FF;z-index:100001;display:none}
.wechat-tip.show{display:block}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="wechat-tip" id="wechatTip">💡 点击右上角「...」可添加到桌面</div>

<!-- 认证 -->
<div class="auth" id="authPage">
<div class="logo">A</div>
<h1>AMBROSE</h1>
<p>AI Health Coach</p>
<input type="text" id="codeInput" placeholder="邀请码 8888" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="off">
<input type="text" id="verifyInput" placeholder="验证码 0812" maxlength="4" class="hide" autocomplete="off" autocorrect="off" autocapitalize="off">
<button id="loginBtn">进入</button>
</div>

<!-- 首页 -->
<div class="page" id="homePage">
<div class="header">
<div class="time" id="timeDisplay">--:--</div>
<div class="greeting" id="userGreeting">你好</div>
<div class="sub">今天感觉如何？💪</div>
</div>

<div class="stats">
<div class="stat" id="stat1">
<div class="stat-num">8,432</div>
<div class="stat-label">步数</div>
</div>
<div class="stat" id="stat2">
<div class="stat-num">342</div>
<div class="stat-label">千卡</div>
</div>
<div class="stat" id="stat3">
<div class="stat-num">7.5</div>
<div class="stat-label">小时</div>
</div>
<div class="stat" id="stat4">
<div class="stat-num">1.2L</div>
<div class="stat-label">饮水</div>
</div>
</div>

<div class="main-btn" id="chatBtn">💬 开始对话</div>

<!-- 功能按钮区 -->
<div style="padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
<div class="main-btn" id="healthBtn" style="margin:0;background:linear-gradient(135deg,#FF2D92,#00D4FF);">❤️ 健康中心</div>
<div class="main-btn" id="nutritionBtn" style="margin:0;background:linear-gradient(135deg,#30D158,#00D4FF);">🥗 饮食记录</div>
</div>

<div class="nav">
<div class="nav-item active" id="navHome"><span>🏠</span><small>首页</small></div>
<div class="nav-item" id="navData"><span>📊</span><small>数据</small></div>
<div class="nav-item" id="navChat"><span>💬</span><small>对话</small></div>
<div class="nav-item" id="navProfile"><span>👤</span><small>我的</small></div>
</div>
</div>

<!-- 聊天 -->
<div class="page" id="chatPage">
<div class="chat-header">
<div class="back-btn" id="backBtn">←</div>
<div>
<div class="chat-title">AMBROSE</div>
<div class="chat-status"><span class="status-dot"></span><span>在线</span></div>
</div>
</div>

<div class="chat-messages" id="chatMessages">
<div class="msg ai"><div class="msg-bubble">你好！我是AMBROSE，你的AI健康教练。有什么可以帮助你的吗？</div></div>
</div>

<div class="chat-input">
<input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" autocorrect="off" autocapitalize="off">
<button id="sendBtn">发送</button>
</div>
</div>

<script>
(function() {
    'use strict';

    // 配置
    var CONFIG = {
        INVITE_CODE: '8888',
        VERIFY_CODE: '0812'
    };

    // 检测微信环境
    var isWechat = /MicroMessenger/i.test(navigator.userAgent);

    // 获取元素
    var $ = function(id) { return document.getElementById(id); };

    // 显示提示
    function showToast(msg) {
        var t = $('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() {
            t.classList.remove('show');
        }, 2000);
    }

    // 更新时间
    function updateTime() {
        var timeEl = $('timeDisplay');
        if (!timeEl) return;

        var now = new Date();
        var utc = now.getTime() + now.getTimezoneOffset() * 60000;
        var bj = new Date(utc + 3600000 * 8);
        var h = bj.getHours();
        var m = bj.getMinutes();
        timeEl.textContent = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;

        // 更新问候语
        var greetEl = $('userGreeting');
        if (greetEl && localStorage.getItem('user')) {
            var saved = localStorage.getItem('user');
            var hour = bj.getHours();
            var timeGreet = hour < 12 ? '早上好' : (hour < 18 ? '下午好' : '晚上好');
            var name = saved === 'boss' ? 'BOSS Shao' : '朋友';
            greetEl.textContent = timeGreet + '，' + name;
        }
    }

    // 登录功能
    function handleLogin() {
        var code1 = $('codeInput').value.trim();
        var code2 = $('verifyInput').value.trim();

        if (code1 !== CONFIG.INVITE_CODE) {
            showToast('邀请码错误');
            return;
        }

        var isBoss = code2 === CONFIG.VERIFY_CODE;
        localStorage.setItem('user', isBoss ? 'boss' : 'guest');

        $('authPage').classList.add('hide');
        $('homePage').classList.add('show');

        updateTime();
        showToast('欢迎回来');

        // 微信环境提示
        if (isWechat) {
            setTimeout(function() {
                $('wechatTip').classList.add('show');
                setTimeout(function() {
                    $('wechatTip').classList.remove('show');
                }, 5000);
            }, 1000);
        }
    }

    // 邀请码输入处理
    function handleCodeInput() {
        var val = this.value.replace(/\D/g, '');
        this.value = val;
        if (val === CONFIG.INVITE_CODE) {
            $('verifyInput').classList.remove('hide');
            $('verifyInput').focus();
        }
    }

    // 检查已登录状态
    function checkLogin() {
        var saved = localStorage.getItem('user');
        if (saved) {
            $('authPage').classList.add('hide');
            $('homePage').classList.add('show');
            updateTime();
        }
    }

    // 页面切换
    function showChat() {
        $('homePage').classList.remove('show');
        $('chatPage').classList.add('show');
    }

    function showHome() {
        $('chatPage').classList.remove('show');
        $('homePage').classList.add('show');
        document.querySelectorAll('.nav-item').forEach(function(el, i) {
            el.classList.toggle('active', i === 0);
        });
    }

    // 发送消息
    function sendMessage() {
        var input = $('messageInput');
        var text = input.value.trim();
        if (!text) return;

        var container = $('chatMessages');
        var userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
        container.appendChild(userMsg);

        input.value = '';
        container.scrollTop = container.scrollHeight;

        setTimeout(function() {
            var aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            aiMsg.innerHTML = '<div class="msg-bubble">收到！我会帮你记录下来。</div>';
            container.appendChild(aiMsg);
            container.scrollTop = container.scrollHeight;
        }, 600);
    }

    // HTML转义
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 绑定所有事件
    function bindEvents() {
        // 登录按钮
        var loginBtn = $('loginBtn');
        if (loginBtn) {
            loginBtn.addEventListener('click', handleLogin);
            loginBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                handleLogin();
            });
        }

        // 邀请码输入
        var codeInput = $('codeInput');
        if (codeInput) {
            codeInput.addEventListener('input', handleCodeInput);
            codeInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        }

        // 验证码输入
        var verifyInput = $('verifyInput');
        if (verifyInput) {
            verifyInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        }

        // 数据卡片
        var statLabels = ['步数: 8,432步', '消耗: 342千卡', '睡眠: 7.5小时', '饮水: 1.2L'];
        for (var i = 1; i <= 4; i++) {
            (function(idx) {
                var stat = $('stat' + idx);
                if (stat) {
                    stat.addEventListener('click', function() {
                        showToast(statLabels[idx - 1]);
                    });
                    stat.addEventListener('touchstart', function(e) {
                        e.preventDefault();
                        showToast(statLabels[idx - 1]);
                    });
                }
            })(i);
        }

        // 开始对话按钮
        var chatBtn = $('chatBtn');
        if (chatBtn) {
            chatBtn.addEventListener('click', showChat);
            chatBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                showChat();
            });
        }

        // 导航
        var navChat = $('navChat');
        if (navChat) {
            navChat.addEventListener('click', showChat);
            navChat.addEventListener('touchstart', function(e) {
                e.preventDefault();
                showChat();
            });
        }

        var navHome = $('navHome');
        if (navHome) {
            navHome.addEventListener('click', function() {
                showToast('首页');
            });
        }

        var navData = $('navData');
        if (navData) {
            navData.addEventListener('click', function() {
                showToast('数据页面开发中');
            });
        }

        var navProfile = $('navProfile');
        if (navProfile) {
            navProfile.addEventListener('click', function() {
                showToast('我的页面开发中');
            });
        }

        // 返回按钮
        var backBtn = $('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', showHome);
            backBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                showHome();
            });
        }

        // 发送按钮
        var sendBtn = $('sendBtn');
        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
            sendBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                sendMessage();
            });
        }

        // 输入框回车
        var msgInput = $('messageInput');
        if (msgInput) {
            msgInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
        }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        checkLogin();
        bindEvents();
        setInterval(updateTime, 1000);
        updateTime();

        // 微信分享优化
        if (isWechat) {
            document.title = 'AMBROSE - AI健康教练';
        }
    });

    // 防止微信下拉回弹
    document.addEventListener('touchmove', function(e) {
        if (e.target.closest('.chat-messages')) return;
        if (e.target.closest('.stats')) return;
    }, { passive: false });

    // ==================== Supabase云服务集成 (超频学习实战) ====================

    // Supabase配置 - 需要替换为实际的项目配置
    var SUPABASE_CONFIG = {
        url: 'https://your-project.supabase.co',  // 替换为你的Supabase URL
        anonKey: 'your-anon-key'  // 替换为你的Anon Key
    };

    // 初始化Supabase客户端
    function initSupabase() {
        if (typeof supabase !== 'undefined') {
            window.db = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
            console.log('✅ Supabase已连接');
            return true;
        }
        console.log('⚠️ Supabase SDK未加载');
        return false;
    }

    // 云同步: 保存健康数据
    async function saveHealthToCloud(date, data) {
        try {
            var user = localStorage.getItem('user');
            if (!user || !window.db) return { success: false, error: '未登录或未连接' };

            var userId = user === 'boss' ? 'boss-shao' : 'guest-user';

            var { error } = await window.db
                .from('daily_health')
                .upsert({
                    user_id: userId,
                    date: date,
                    steps: data.steps || 0,
                    calories: data.calories || 0,
                    sleep_hours: data.sleep || 0,
                    water_ml: data.water || 0,
                    updated_at: new Date().toISOString()
                }, { onConflict: ['user_id', 'date'] });

            if (error) throw error;
            console.log('✅ 健康数据已同步到云端');
            return { success: true };
        } catch (e) {
            console.error('❌ 云端同步失败:', e);
            return { success: false, error: e.message };
        }
    }

    // 云同步: 获取健康数据
    async function getHealthFromCloud(date) {
        try {
            var user = localStorage.getItem('user');
            if (!user || !window.db) return { success: false, data: null };

            var userId = user === 'boss' ? 'boss-shao' : 'guest-user';

            var { data, error } = await window.db
                .from('daily_health')
                .select('*')
                .eq('user_id', userId)
                .eq('date', date)
                .single();

            if (error && error.code !== 'PGRST116') throw error; // PGRST116 = 无数据

            return { success: true, data: data };
        } catch (e) {
            console.error('❌ 获取云端数据失败:', e);
            return { success: false, error: e.message };
        }
    }

    // 云同步: 保存运动记录
    async function saveExerciseToCloud(exercise) {
        try {
            var user = localStorage.getItem('user');
            if (!user || !window.db) return { success: false };

            var userId = user === 'boss' ? 'boss-shao' : 'guest-user';

            var { error } = await window.db
                .from('exercises')
                .insert({
                    user_id: userId,
                    type: exercise.type,
                    duration_minutes: exercise.duration,
                    calories_burned: exercise.calories,
                    date: new Date().toISOString().split('T')[0],
                    created_at: new Date().toISOString()
                });

            if (error) throw error;
            console.log('✅ 运动记录已同步到云端');
            return { success: true };
        } catch (e) {
            console.error('❌ 运动记录同步失败:', e);
            return { success: false, error: e.message };
        }
    }

    // 检查云同步状态
    function checkCloudSync() {
        var syncIndicator = document.getElementById('syncIndicator');
        if (!syncIndicator) {
            // 创建同步状态指示器
            syncIndicator = document.createElement('div');
            syncIndicator.id = 'syncIndicator';
            syncIndicator.style.cssText = 'position:fixed;top:50px;right:10px;width:8px;height:8px;border-radius:50%;background:#30D158;z-index:99999;transition:all 0.3s';
            document.body.appendChild(syncIndicator);
        }

        if (window.db) {
            syncIndicator.style.background = '#30D158'; // 绿色 = 已连接
            syncIndicator.title = '云同步已连接';
        } else {
            syncIndicator.style.background = '#FF453A'; // 红色 = 未连接
            syncIndicator.title = '云同步未连接';
        }
    }

    // 在初始化时尝试连接Supabase
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            if (initSupabase()) {
                checkCloudSync();
            }
        }, 1000);
    });

})();
</script>

<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- 核心服务 -->
<script src="/supabase-client.js"></script>

<!-- PWA Service Worker 注册 -->
<script>
(function() {
    'use strict';

    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('[PWA] Service Worker registered:', registration.scope);
                })
                .catch(function(error) {
                    console.log('[PWA] Service Worker registration failed:', error);
                });
        });
    }

    // 检测是否可安装
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        console.log('[PWA] App can be installed');

        // 可以在这里显示安装按钮
        // showInstallButton();
    });

    // 安装成功
    window.addEventListener('appinstalled', function() {
        console.log('[PWA] App was installed');
        deferredPrompt = null;
    });

    // 检测是否已安装 (standalone 模式)
    if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('[PWA] Running in standalone mode');
    }

    // 在线/离线状态
    function updateOnlineStatus() {
        const isOnline = navigator.onLine;
        console.log('[PWA] Network status:', isOnline ? 'online' : 'offline');

        // 显示离线提示
        if (!isOnline) {
            showToast('已切换到离线模式');
        }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // 请求通知权限
    function requestNotificationPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(function(permission) {
                console.log('[PWA] Notification permission:', permission);
            });
        }
    }

    // 页面加载完成后请求权限
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(requestNotificationPermission, 5000);
    });

})();
</script>

<!-- 全局配置 (从环境变量或配置服务器获取) -->
<script>
(function() {
    'use strict';

    // 默认配置 (占位符，会被环境变量覆盖)
    const DEFAULT_CONFIG = {
        SUPABASE_URL: null,
        SUPABASE_ANON_KEY: null,
        STRIPE_PUBLIC_KEY: null,
        SENTRY_DSN: null,
        VERSION: '1.1.0',
        BUILD_DATE: '2026-03-06'
    };

    // 如果后端注入了 __ENV__，使用它
    if (window.__ENV__) {
        window.APP_CONFIG = Object.assign({}, DEFAULT_CONFIG, window.__ENV__);
    } else {
        window.APP_CONFIG = DEFAULT_CONFIG;
    }

    // 检查配置是否完整
    window.isConfigValid = function() {
        return window.APP_CONFIG.SUPABASE_URL &&
               window.APP_CONFIG.SUPABASE_URL !== 'https://your-project.supabase.co' &&
               window.APP_CONFIG.SUPABASE_ANON_KEY &&
               window.APP_CONFIG.SUPABASE_ANON_KEY !== 'your-anon-key';
    };

    // 检查支付配置
    window.isStripeConfigured = function() {
        return window.APP_CONFIG.STRIPE_PUBLIC_KEY &&
               window.APP_CONFIG.STRIPE_PUBLIC_KEY !== 'pk_test_your_key_here' &&
               !window.APP_CONFIG.STRIPE_PUBLIC_KEY.includes('your_key');
    };

})();
</script>

<!-- 增强功能初始化 -->
<script>
(function() {
    'use strict';
    
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('🚀 AMBROSE Health v' + window.APP_CONFIG.VERSION + ' 启动中...');
        
        // 1. 初始化 Sentry 监控 (可选)
        if (window.sentryMonitor && window.APP_CONFIG.SENTRY_DSN) {
            window.SENTRY_DSN = window.APP_CONFIG.SENTRY_DSN;
            await sentryMonitor.init();
            sentryMonitor.addBreadcrumb('app', 'App initialized');
        }
        
        // 2. 初始化 Supabase (如果配置了)
        if (window.isConfigValid && window.isConfigValid()) {
            if (window.supabaseService) {
                supabaseService.supabaseUrl = window.APP_CONFIG.SUPABASE_URL;
                supabaseService.supabaseKey = window.APP_CONFIG.SUPABASE_ANON_KEY;
                
                // 重新初始化客户端
                if (typeof supabase !== 'undefined') {
                    try {
                        supabaseService.client = supabase.createClient(
                            supabaseService.supabaseUrl, 
                            supabaseService.supabaseKey
                        );
                        window.db = supabaseService.client;
                        console.log('✅ Supabase 云服务已连接');
                    } catch (e) {
                        console.error('❌ Supabase 连接失败:', e);
                    }
                }
            }
        } else {
            console.log('ℹ️ Supabase 未配置，使用本地模式');
            console.log('   查看 SUPABASE_SETUP.md 了解如何配置');
        }
        
        // 3. 初始化 Stripe (如果配置了)
        if (window.isStripeConfigured && window.isStripeConfigured()) {
            if (window.stripeService) {
                stripeService.publishableKey = window.APP_CONFIG.STRIPE_PUBLIC_KEY;
                try {
                    await stripeService.init();
                    console.log('✅ Stripe 支付服务已就绪');
                } catch (e) {
                    console.error('❌ Stripe 初始化失败:', e);
                }
            }
        } else {
            console.log('ℹ️ Stripe 未配置，支付功能不可用');
            console.log('   查看 VERCEL_ENV.md 了解如何配置');
        }
        
        // 4. 检查支付状态 (从 URL 参数)
        if (window.stripeService) {
            stripeService.checkPaymentStatus();
        }
        
        // 5. 设置用户信息到 Sentry
        const user = localStorage.getItem('user');
        if (user && window.sentryMonitor) {
            sentryMonitor.setUser({
                id: user === 'boss' ? 'boss-shao' : 'guest',
                name: user === 'boss' ? 'BOSS Shao' : 'Guest'
            });
        }
        
        console.log('✅ 启动完成');
        
        // 显示配置状态 (仅开发模式)
        if (location.hostname === 'localhost' || location.search.includes('debug')) {
            console.log('📊 配置状态:', {
                supabase: window.isConfigValid ? window.isConfigValid() : false,
                stripe: window.isStripeConfigured ? window.isStripeConfigured() : false,
                sentry: !!window.APP_CONFIG.SENTRY_DSN
            });
        }
    });
    
    // 全局错误捕获
    window.onerror = function(msg, url, line, col, error) {
        console.error('[Global Error]', msg, 'at', url + ':' + line);
        if (window.sentryMonitor && window.APP_CONFIG.SENTRY_DSN) {
            sentryMonitor.captureError(error || new Error(msg), { url, line, col });
        }
        return false;
    };
    
    window.onunhandledrejection = function(event) {
        console.error('[Unhandled Promise Rejection]', event.reason);
        if (window.sentryMonitor && window.APP_CONFIG.SENTRY_DSN) {
            sentryMonitor.captureError(event.reason, { type: 'unhandledrejection' });
        }
    };
    
})();
</script>
