<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>AMBROSE | AI Health Coach</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(255,45,146,0.08) 0%, transparent 40%), #000; }
        
        /* 页面 */
        .page { display: none; position: relative; z-index: 1; max-width: 430px; margin: 0 auto; min-height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        
        /* 认证 */
        .auth-screen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: #000; }
        .auth-screen.hidden { display: none !important; }
        .auth-logo { width: 100px; height: 100px; margin-bottom: 32px; background: linear-gradient(135deg, #00D4FF, #FF2D92); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 700; color: #000; }
        .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .auth-subtitle { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 32px; }
        .input { width: 100%; max-width: 280px; padding: 14px; font-size: 17px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; text-align: center; margin-bottom: 12px; }
        .input:focus { outline: none; border-color: #00D4FF; }
        .btn { width: 100%; max-width: 280px; padding: 14px; font-size: 17px; font-weight: 600; background: #00D4FF; color: #000; border: none; border-radius: 12px; cursor: pointer; }
        
        /* 首页 */
        .home-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #00D4FF, #FF2D92); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
        .home-content { flex: 1; padding: 0 20px 100px; overflow-y: auto; }
        .card { padding: 20px; margin-bottom: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
        .card-title { font-size: 12px; color: #00D4FF; margin-bottom: 8px; }
        .card-text { font-size: 20px; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; text-align: center; }
        .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.6); }
        .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .action { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; text-align: center; cursor: pointer; }
        .action-icon { font-size: 24px; margin-bottom: 4px; }
        .action-label { font-size: 11px; color: rgba(255,255,255,0.7); }
        
        /* 聊天 */
        .chat-header { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 50%; }
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .chat-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #00D4FF, #FF2D92); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
        .chat-content { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { display: flex; gap: 10px; margin-bottom: 16px; max-width: 85%; }
        .msg.user { margin-left: auto; flex-direction: row-reverse; }
        .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .msg.ai .msg-bubble { background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .msg.user .msg-bubble { background: #00D4FF; color: #000; border-bottom-right-radius: 4px; }
        .chat-input-area { padding: 12px 16px 24px; border-top: 1px solid rgba(255,255,255,0.08); }
        .chat-input-wrap { display: flex; gap: 10px; background: rgba(255,255,255,0.08); border-radius: 24px; padding: 4px 4px 4px 16px; }
        .chat-input { flex: 1; padding: 10px 0; font-size: 15px; background: transparent; border: none; color: #fff; }
        .chat-send { width: 40px; height: 40px; background: #00D4FF; border: none; border-radius: 50%; color: #000; font-size: 16px; cursor: pointer; }
        
        /* 导航 */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; padding: 8px 0 24px; background: rgba(0,0,0,0.95); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 20px; cursor: pointer; opacity: 0.5; }
        .nav-item.active { opacity: 1; }
        .nav-icon { font-size: 22px; }
        .nav-label { font-size: 10px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <!-- 认证 -->
    <div class="auth-screen" id="auth">
        <div class="auth-logo">A</div>
        <h1 class="auth-title">AMBROSE</h1>
        <p class="auth-subtitle">AI HEALTH COACH</p>
        <input type="text" class="input" id="code" placeholder="邀请码 8888" maxlength="4">
        <button class="btn" id="login">进入系统</button>
    </div>
    
    <!-- 首页 -->
    <div class="page" id="home">
        <div class="home-header">
            <div class="logo">
                <div class="logo-icon">A</div>
                <span style="font-weight:700;">AMBROSE</span>
            </div>
        </div>
        
        <div class="home-content">
            <div class="card">
                <div class="card-title">NEURAL LINK v3.0</div>
                <div class="card-text" id="greeting">你好</div>
            </div>
            
            <div class="grid">
                <div class="stat-card">
                    <div class="stat-icon">👟</div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">步数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">千卡</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">😴</div>
                    <div class="stat-value">--</div>
                    <div class="stat-label">睡眠</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💧</div>
                    <div class="stat-value">0</div>
                    <div class="stat-label">饮水</div>
                </div>
            </div>
            
            <div class="card">
                <div style="font-size:16px;margin-bottom:12px;">快捷记录</div>
                <div class="actions">
                    <div class="action" onclick="toast('记录体重')">
                        <div class="action-icon">⚖️</div>
                        <div class="action-label">体重</div>
                    </div>
                    <div class="action" onclick="toast('记录饮食')">
                        <div class="action-icon">🍽️</div>
                        <div class="action-label">饮食</div>
                    </div>
                    <div class="action" onclick="toast('记录运动')">
                        <div class="action-icon">🏃</div>
                        <div class="action-label">运动</div>
                    </div>
                    <div class="action" onclick="toast('记录睡眠')">
                        <div class="action-icon">🌙</div>
                        <div class="action-label">睡眠</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 聊天 -->
    <div class="page" id="chat">
        <div class="chat-header">
            <div class="back-btn" onclick="showPage('home')">←</div>
            <div class="chat-avatar">A</div>
            <div>
                <div style="font-weight:600;">AMBROSE</div>
                <div style="font-size:13px;color:#30D158;">● 在线</div>
            </div>
        </div>
        
        <div class="chat-content" id="messages">
            <div class="msg ai">
                <div class="msg-bubble">你好！我是AMBROSE，你的AI健康教练。今天感觉怎么样？</div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="chat-input-wrap">
                <input type="text" class="chat-input" id="msgInput" placeholder="输入消息...">
                <button class="chat-send" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
    
    <!-- 导航 -->
    <div class="nav" id="nav">
        <div class="nav-item active" onclick="showPage('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">首页</div>
        </div>
        <div class="nav-item" onclick="toast('开发中')">
            <div class="nav-icon">📊</div>
            <div class="nav-label">数据</div>
        </div>
        <div class="nav-item" onclick="showPage('chat')">
            <div class="nav-icon">💬</div>
            <div class="nav-label">对话</div>
        </div>
        <div class="nav-item" onclick="toast('开发中')">
            <div class="nav-icon">👤</div>
            <div class="nav-label">我的</div>
        </div>
    </div>
    
    <script>
        // 全局变量
        var currentPage = 'home';
        var isLoggedIn = false;
        
        // 显示提示
        function toast(msg) {
            var div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(40,40,40,0.98);padding:16px 24px;border-radius:12px;z-index:10000;font-size:15px;';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(function() { div.remove(); }, 1500);
        }
        
        // 页面切换
        function showPage(page) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.getElementById(page).classList.add('active');
            
            // 更新导航
            document.querySelectorAll('.nav-item').forEach(function(item, index) {
                item.classList.remove('active');
                if ((page === 'home' && index === 0) || (page === 'chat' && index === 2)) {
                    item.classList.add('active');
                }
            });
            
            // 聊天页面隐藏导航
            document.getElementById('nav').style.display = (page === 'chat') ? 'none' : 'flex';
            
            currentPage = page;
        }
        
        // 发送消息
        function sendMsg() {
            var input = document.getElementById('msgInput');
            var text = input.value.trim();
            if (!text) return;
            
            // 添加用户消息
            var container = document.getElementById('messages');
            container.innerHTML += '<div class="msg user"><div class="msg-bubble">' + text + '</div></div>';
            input.value = '';
            container.scrollTop = container.scrollHeight;
            
            // AI回复
            setTimeout(function() {
                var replies = ['收到！我会记录下来。', '保持良好的健康习惯！', '建议今天多喝水哦。', '你的进步很明显！'];
                var reply = replies[Math.floor(Math.random() * replies.length)];
                container.innerHTML += '<div class="msg ai"><div class="msg-bubble">' + reply + '</div></div>';
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }
        
        // 登录
        document.getElementById('login').addEventListener('click', function() {
            var code = document.getElementById('code').value;
            if (code === '8888') {
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('home').classList.add('active');
                isLoggedIn = true;
                document.getElementById('greeting').textContent = '你好，BOSS Shao';
            } else {
                toast('邀请码错误');
            }
        });
        
        // 回车发送
        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMsg();
        });
        
        // 回车登录
        document.getElementById('code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('login').click();
        });
    </script>
</body>
</html>
