<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMBROSE - AI健康教练</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f; 
      color: #fff; 
      min-height: 100vh;
    }
    
    /* 页面容器 */
    .page { 
      display: none; 
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .page.active { display: block; }
    
    /* 登录页 */
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 {
      font-size: 48px;
      background: linear-gradient(135deg, #00f3ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .login-box {
      width: 100%;
      max-width: 340px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
    }
    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00f3ff, #00c4cc);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
    
    /* 主页 */
    .header {
      padding: 24px;
      background: linear-gradient(180deg, rgba(0,243,255,0.1), transparent);
    }
    .time {
      font-size: 48px;
      font-weight: 700;
      color: #00f3ff;
      text-shadow: 0 0 20px rgba(0,243,255,0.5);
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      margin: 0 20px 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 20px;
    }
    .stat {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: #00f3ff; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    
    /* 底部导航 */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: rgba(10,10,15,0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
    }
    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .nav-btn.active { color: #00f3ff; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: rgba(0,0,0,0.9);
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="page-login" class="page active">
    <div class="login-container">
      <div class="logo">
        <h1>AMBROSE</h1>
        <p style="color: rgba(255,255,255,0.6);">AI HEALTH COACH</p>
      </div>
      <div class="login-box">
        <input type="password" id="code" placeholder="输入识别码">
        <button onclick="doLogin()">进入系统</button>
      </div>
    </div>
  </div>

  <!-- 主页 -->
  <div id="page-home" class="page">
    <div class="header">
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 4px;">早安</p>
      <h2 style="margin-bottom: 16px;">BOSS Shao</h2>
      <div class="time" id="clock">00:00:00</div>
    </div>
    
    <div class="card">
      <div style="font-size: 32px; margin-bottom: 12px;">🤖</div>
      <p style="margin-bottom: 16px;">早安，BOSS！今天想做什么？</p>
      <button onclick="showMsg('开始训练')" style="margin-bottom: 8px;">开始训练</button>
      <button onclick="showMsg('记录饮食')" style="background: transparent; border: 1px solid #00f3ff; color: #00f3ff;">记录饮食</button>
    </div>
    
    <p style="padding: 0 20px 12px; font-weight: 600;">今日数据</p>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">8,432</div>
        <div class="stat-label">步数</div>
      </div>
      <div class="stat">
        <div class="stat-value">368</div>
        <div class="stat-label">千卡</div>
      </div>
      <div class="stat">
        <div class="stat-value">7.5h</div>
        <div class="stat-label">睡眠</div>
      </div>
      <div class="stat">
        <div class="stat-value">1.2L</div>
        <div class="stat-label">饮水</div>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div id="navbar" class="nav" style="display: none;">
    <button class="nav-btn active" onclick="goPage('home')">🏠<br>首页</button>
    <button class="nav-btn" onclick="showMsg('训练')">💪<br>训练</button>
    <button class="nav-btn" onclick="showMsg('饮食')">🥗<br>饮食</button>
    <button class="nav-btn" onclick="showMsg('我的')">👤<br>我的</button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // 登录
    function doLogin() {
      var code = document.getElementById('code').value;
      if (code === '0812') {
        showMsg('👑 欢迎BOSS');
        setTimeout(function() {
          document.getElementById('page-login').classList.remove('active');
          document.getElementById('page-home').classList.add('active');
          document.getElementById('navbar').style.display = 'flex';
          startClock();
        }, 500);
      } else {
        showMsg('识别码错误');
      }
    }

    // 时钟
    function startClock() {
      function update() {
        var now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', {hour12: false});
      }
      update();
      setInterval(update, 1000);
    }

    // 页面切换
    function goPage(page) {
      document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
      event.target.classList.add('active');
    }

    // Toast提示
    function showMsg(text) {
      var t = document.getElementById('toast');
      t.textContent = text;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    console.log('✅ AMBROSE 已加载');
  </script>
</body>
</html>
