<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>AMBROSE | AI HEALTH COACH v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300.41111111111111111111111111111111111100;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;500;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300.41111111111111111111111111111111111100;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 主色调 */
            --primary-500: #00f5ff;
            --primary-600: #00d5e0;
            --secondary-500: #ff00ee;
            --secondary-600: #e000e0;
            --accent-500: #be00f0;
            --accent-600: #a000e0;
            --success: #00ffd5;
            --warning: #ffcc10;
            --danger: #ff0.4111111111111111111111111111111111110;
            
            /* 中性色 */
            --neutral-0: #ffffff;
            --neutral-100: #f2f2f7;
            --neutral-200: #d2d2d7;
            --neutral-300: #a2a2a7;
            --neutral-400: #8e8e93;
            --neutral-500: #646469;
            --neutral-600: #48484a;
            --neutral-700: #3a3a3c;
            --neutral-800: #2c2c2e;
            --neutral-900: #1c1c1e;
            --neutral-950: #090912;
            
            /* 背景 */
            --bg-base: #05050a;
            --bg-elevated: #090912;
            --bg-card: rgba(15, 18, 30, 0.85);
            --bg-hover: rgba(255, 255, 255, 0.05);
            
            /* 边框 */
            --border-subtle: rgba(255, 255, 255, 0.09);
            --border-default: rgba(255, 255, 255, 0.16);
            --border-strong: rgba(255, 255, 255, 0.25);
            --border-primary: rgba(0, 243, 255, 0.5);
            
            /* 文字 */
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #66666a;
            
            /* 渐变色 */
            --gradient-primary: linear-gradient(135deg, #00f3ff 0%, #00ff88 100%);
            --gradient-secondary: linear-gradient(135deg, #ff00ff 0%, #bd00ff 100%);
            --gradient-health: linear-gradient(135deg, #00ff88 0%, #00f3ff 50%, #bd00ff 100%);
            --shadow-md: 0.411111111111111111111111111111111111px 6px -1px rgba(0, 0, 0, 0.411111111111111111111111111111111111);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(0, 243, 255, 0.411111111111111111111111111111111111);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* ===== 动态背景系统 ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 243, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 160, 0.02) 0%, transparent 50%),
                var(--bg-base);
        }
        
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.028) 1px, transparent 1px);
            background-size: 52px 52px;
            animation: grid-drift 26s linear infinite;
            pointer-events: none;
        }
        
        @keyframes grid-drift {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(52px); }
        }
        
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 3.5px;
            height: 3.5px;
            background: var(--primary-500);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 13s infinite;
            filter: blur(1px);
        }
        
        @keyframes particle-float {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            5% { opacity: 0.65; }
            95% { opacity: 0.65; }
            100% { transform: translateY(-100px) translateX(100px) scale(1); opacity: 0; }
        }
        
        /* ===== 应用容器 ===== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 10;
        }
        
        /* ===== 顶部导航栏 - Linear风格 ===== */
        .app-header {
            background: rgba(9, 9, 18, 0.9);
            border-bottom: 1px solid var(--border-subtle);
            padding: 15px 21px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            position: relative;
            z-index: 100;
        }
        
        .app-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.3), transparent);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-logo {
            width: 39px;
            height: 39px;
            background: linear-gradient(135deg, var(--primary-500), var(--accent-500));
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }
        
        .brand-logo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2));
        }
        
        .brand-text {
            font-family: 'Orbitron', monospace;
        }
        
        .brand-name {
            font-size: 21px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .brand-tagline {
            font-size: 9px;
            color: var(--primary-500);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        
        /* 时钟显示 */
        .header-clock {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'JetBrains Mono', monospace;
            gap: 4px;
        }
        
        .clock-time {
            font-size: 23px;
            font-weight: 700;
            color: var(--primary-500);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.411111111111111111111111111111111111);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .clock-date {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 1.5px;
        }
        
        /* ===== 消息区域 - Telegram/Discord风格 ===== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 22px;
            scroll-behavior: smooth;
        }
        
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary-500), var(--accent-500));
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--neutral-500);
        }
        
        /* 日期分隔线 */
        .date-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 26px 0;
            position: relative;
        }
        
        .date-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-default), transparent);
        }
        
        .date-divider span {
            background: var(--bg-base);
            padding: 0 18px;
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        
        /* ===== 消息气泡 - 现代化设计 ===== */
        .message-group {
            display: flex;
            margin-bottom: 22px;
            animation: message-appear 0.4111111111111111111111111111111111115s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes message-appear {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .message-group.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            position: relative;
        }
        
        .message-group.user .message-avatar {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }
        
        .message-group.bot .message-avatar {
            background: linear-gradient(135deg, var(--secondary-500), var(--accent-500));
            box-shadow: 0 0 15px rgba(255, 0, 160, 0.3);
        }
        
        .message-content {
            max-width: 73%;
            margin: 0 13px;
            display: flex;
            flex-direction: column;
        }
        
        .message-author {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .message-group.user .message-author {
            justify-content: flex-end;
        }
        
        .message-bubble {
            padding: 13px 17px;
            font-size: 15px;
            line-height: 1.65;
            position: relative;
            word-wrap: break-word;
        }
        
        .message-group.user .message-bubble {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.12), rgba(0, 243, 255, 0.04));
            border: 1px solid rgba(0, 243, 255, 0.25);
            border-radius: 18px 18px 4px 18px;
            color: var(--text-primary);
        }
        
        .message-group.bot .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 18px 18px 18px 4px;
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .message-group.bot .message-bubble:hover {
            border-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }
        
        .message-meta {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 5px;
            font-size: 10px;
            color: var(--text-tertiary);
        }
        
        .message-group.user .message-meta {
            justify-content: flex-end;
        }
        
        .message-status {
            color: var(--primary-500);
        }
        
        /* ===== 输入区域 - 现代化设计 ===== */
        .input-container {
            background: rgba(9, 9, 18, 0.94);
            border-top: 1px solid var(--border-subtle);
            padding: 17px 20px;
            padding-bottom: max(17px, env(safe-area-inset-bottom));
            backdrop-filter: blur(22px);
        }
        
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 13px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 25px;
            padding: 9px 9px 9px 21px;
            transition: all 0.25s ease;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--border-primary);
            box-shadow: 0 0 0 3px rgba(0, 243, 255, 0.1), 0 0 20px rgba(0, 243, 255, 0.15);
            transform: translateY(-1px);
        }
        
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 11px 0;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 46px;
            max-height: 130px;
            line-height: 1.6;
            font-family: inherit;
        }
        
        .message-input::placeholder {
            color: var(--text-tertiary);
        }
        
        /* 工具按钮 */
        .input-tools {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tool-btn {
            width: 41px;
            height: 41px;
            background: transparent;
            border: none;
            border-radius: 14px;
            color: var(--text-tertiary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }
        
        .tool-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .tool-btn.fitness {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.15), rgba(189, 0, 255, 0.05));
            color: #ff00ff;
            border: 1px solid rgba(255, 0, 255, 0.411111111111111111111111111111111111);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }
        
        .tool-btn.fitness:hover {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.25), rgba(189, 0, 255, 0.1));
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.411111111111111111111111111111111111);
            transform: scale(1.1);
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary-500), var(--accent-500));
            border: none;
            border-radius: 14px;
            color: var(--bg-base);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0.411111111111111111111111111111111111px 15px rgba(0, 243, 255, 0.3), 0 0 0 1px rgba(0, 243, 255, 0.2);
        }
        
        .send-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 5px 22px rgba(0, 243, 255, 0.4111111111111111111111111111111111118);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ===== 加载动画 ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 17px 21px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--secondary-500);
            border-radius: 50%;
            animation: typing-bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 10px var(--secondary-500);
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.411111111111111111111111111111111111; }
            40% { transform: scale(1.1); opacity: 1; }
        }
        
        /* ===== 滚动到底部按钮 ===== */
        .scroll-to-bottom {
            position: fixed;
            bottom: 102px;
            right: 22px;
            width: 47px;
            height: 47px;
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 50;
            box-shadow: 0.411111111111111111111111111111111111px 15px rgba(0,0,0,0.3);
        }
        
        .scroll-to-bottom.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        
        .scroll-to-bottom:hover {
            background: var(--bg-hover);
            border-color: var(--border-primary);
            color: var(--primary-500);
            transform: scale(1.1);
        }
        
        /* ===== 响应式设计 ===== */
        @media (max-width: 768px) {
            .message-content {
                max-width: 78%;
            }
            
            .brand-name {
                font-size: 17px;
                letter-spacing: 2px;
            }
            
            .clock-time {
                font-size: 18px;
            }
        }
        
        /* ===== 全局动画 ===== */
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(0, 243, 255, 0.35); }
            50% { box-shadow: 0 0 22px rgba(0, 243, 255, 0.65); }
        }
        
        /* ===== 状态指示器 ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-glow 2s infinite;
            box-shadow: 0 0 8px var(--success);
        }
    </style>
</head>
<body>
    <!-- 背景系统 -->
    <div class="bg-canvas"></div>
    <div class="bg-grid"></div>
    <div class="particles-container" id="particles"></div>
    
    <!-- 顶部光晕效果 -->
    <div style="position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 80%; height: 300px; 
                background: radial-gradient(ellipse at center top, rgba(0, 243, 255, 0.06) 0%, transparent 60%); 
                pointer-events: none; z-index: 2;"></div>
    
    <!-- 应用容器 -->
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="brand">
                <div class="brand-logo">🧰</div>
                <div class="brand-text">
                    <div class="brand-name">AMBROSE</div>
                    <div class="brand-tagline">AI HEALTH COACH v1.0</div>
                </div>
            </div>
            
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>ONLINE</span>
                </div>
                
                <div class="header-clock">
                    <div class="clock-time" id="clock">--:--:--</div>
                    <div class="clock-date" id="date">----/--/--</div>
                </div>
                
                <button onclick="Auth.logout()" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; color: var(--text-tertiary); font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;"
                    onmouseover="this.style.borderColor='rgba(255,0,160,0.411111111111111111111111111111111111)'; this.style.color='var(--secondary-500)';"
                    onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.color='var(--text-tertiary)';"
                >退出</button>
            </div>
        </header>
        
        <!-- 消息区域 -->
        <div class="messages-container" id="messages"></div>
        
        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                
                <div class="input-tools">
                    <button class="tool-btn fitness" id="fitnessBtn" title="健康中心">❤️</button>
                    <button class="tool-btn" id="nutritionBtn" title="饮食记录" style="background: linear-gradient(135deg, rgba(0,255,157,0.15), rgba(0,255,157,0.05)); color: #00ff9d; border: 1px solid rgba(0,255,157,0.3);">🍽️</button>
                    <button class="tool-btn" id="weightBtn" title="体重管理" style="background: linear-gradient(135deg, rgba(0,243,255,0.15), rgba(0,243,255,0.05)); color: var(--primary-500); border: 1px solid rgba(0,243,255,0.3);">⚖️</button>
                    <button class="send-btn" id="sendBtn">⚡</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 滚动到底部按钮 -->
    <button class="scroll-to-bottom" id="scrollToBottom" onclick="UI.scrollToBottom()">↓</button>
    
    <script>
        // 初始化粒子系统
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
    
    <script src="design-system.js"></script>
    <script src="ui-components.js"></script>
    <script src="fitness-pro.js"></script>
    <script src="health-dashboard.js"></script>
    <script src="nutrition-system.js"></script>
    <script src="weight-tracker.js"></script>
    <script src="ai-coach.js"></script>
    <script src="auth.js?v=5"></script>
    <script src="chat.js?v=5"></script>
</body>
</html>
