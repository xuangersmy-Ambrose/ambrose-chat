<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AMBROSE</title>
    
    <style>
        /* ===== 乔布斯设计理念 =====
         * - 少即是多 (Less is More)
         * - 清晰、简洁、优雅
         * - 大量留白
         * - 精致细节
         * - 内容为王
         */
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }
        
        html, body { 
            background: #000; 
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 纯粹的黑色背景 - 不分散注意力 */
        .bg { 
            position: fixed; 
            inset: 0; 
            z-index: 0; 
            background: #000;
        }
        
        /* 极简动态渐变 - 只在角落，不抢眼 */
        .bg::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 60%);
            animation: breathe 8s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        /* ===== 页面容器 ===== */
        .page { 
            display: none; 
            position: relative; 
            z-index: 1; 
            max-width: 430px; 
            margin: 0 auto; 
            min-height: 100vh;
            flex-direction: column;
            padding: 0 24px 100px;
        }
        .page.active { display: flex; }
        
        /* ===== 认证界面 - 极致简约 ===== */
        .auth-screen { 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            background: #000;
        }
        .auth-screen.hidden { display: none !important; }
        
        .auth-logo { 
            width: 80px; 
            height: 80px; 
            margin-bottom: 40px; 
            background: linear-gradient(135deg, #00D4FF, #FF2D92); 
            border-radius: 20px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 32px; 
            font-weight: 700; 
            color: #000;
            box-shadow: 0 8px 32px rgba(0,212,255,0.2);
        }
        
        .auth-title { 
            font-size: 32px; 
            font-weight: 700; 
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        
        .auth-subtitle { 
            font-size: 15px; 
            color: rgba(255,255,255,0.5); 
            margin-bottom: 48px;
            font-weight: 400;
        }
        
        .input-field { 
            width: 100%; 
            max-width: 280px; 
            padding: 16px 20px; 
            font-size: 17px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            color: #fff; 
            text-align: center; 
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-field:focus { 
            border-color: #00D4FF; 
            background: rgba(255,255,255,0.08);
        }
        .input-field.hidden { display: none !important; }
        
        .btn-primary { 
            width: 100%; 
            max-width: 280px; 
            padding: 16px; 
            font-size: 17px; 
            font-weight: 600; 
            background: #00D4FF; 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:active { 
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        /* ===== 首页 - 乔布斯风格 ===== */
        .home-header { 
            padding: 60px 0 32px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .greeting-time {
            font-size: 15px;
            color: #00D4FF;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        
        .greeting-name {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        
        .greeting-sub {
            font-size: 17px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }
        
        /* ===== 时间显示 - 优雅 ===== */
        .time-display {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 100px;
            width: fit-content;
        }
        
        .time-dot {
            width: 6px;
            height: 6px;
            background: #30D158;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .time-text {
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.05em;
        }
        
        /* ===== 核心数据 - 极简卡片 ===== */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
            margin-top: 32px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .stat-card {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            transition: all 0.2s ease;
        }
        .stat-card:active {
            background: rgba(255,255,255,0.06);
            transform: scale(0.98);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        
        .stat-unit {
            font-size: 15px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
        }
        
        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }
        
        /* ===== 主操作按钮 - 大而明显 ===== */
        .primary-action {
            margin-top: 32px;
            padding: 18px 24px;
            background: linear-gradient(135deg, #00D4FF, #00B4E6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .primary-action:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .primary-action-icon {
            font-size: 20px;
        }
        
        .primary-action-text {
            font-size: 17px;
            font-weight: 600;
            color: #000;
        }
        
        /* ===== 次要操作 - 简洁列表 ===== */
        .actions-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .action-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-item:active {
            background: rgba(255,255,255,0.05);
        }
        
        .action-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .action-content {
            flex: 1;
        }
        
        .action-title {
            font-size: 16px;
            font-weight: 500;
        }
        
        .action-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }
        
        .action-arrow {
            font-size: 14px;
            color: rgba(255,255,255,0.3);
        }
        
        /* ===== 底部导航 - 精致 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        
        .nav-items {
            display: flex;
            justify-content: space-around;
            max-width: 430px;
            margin: 0 auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 24px;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s ease;
        }
        .nav-item.active {
            opacity: 1;
        }
        .nav-item:active {
            opacity: 0.7;
        }
        
        .nav-icon {
            font-size: 22px;
        }
        
        .nav-label {
            font-size: 10px;
            font-weight: 500;
        }
        
        /* ===== 聊天界面 - 极简 ===== */
        .chat-header {
            padding: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .chat-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
        }
        .chat-back:active {
            background: rgba(255,255,255,0.05);
        }
        
        .chat-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00D4FF, #FF2D92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-size: 17px;
            font-weight: 600;
        }
        
        .chat-status {
            font-size: 13px;
            color: #30D158;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }
        
        .message.user .message-bubble {
            background: #00D4FF;
            color: #000;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-bubble {
            background: rgba(255,255,255,0.08);
            border-bottom-left-radius: 4px;
        }
        
        .chat-input-area {
            padding: 16px 0 calc(16px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .chat-input-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 4px 4px 4px 20px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 0;
            font-size: 16px;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
        }
        .chat-input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .chat-send {
            width: 44px;
            height: 44px;
            background: #00D4FF;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #000;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .chat-send:active {
            transform: scale(0.95);
        }
        .chat-send:disabled {
            background: rgba(255,255,255,0.1);
            cursor: not-allowed;
        }
        
        /* ===== Toast提示 ===== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(40,40,40,0.98);
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <!-- 认证界面 -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-logo">A</div>
        <h1 class="auth-title">AMBROSE</h1>
        <p class="auth-subtitle">AI Health Coach</p>
        <input type="text" class="input-field" id="inviteCode" placeholder="邀请码" maxlength="4" autocomplete="off">
        <input type="text" class="input-field hidden" id="verifyCode" placeholder="身份验证码" maxlength="4" autocomplete="off">
        <button class="btn-primary" id="authBtn">进入</button>
    </div>
    
    <!-- 首页 -->
    <div class="page" id="page-home">
        <header class="home-header">
            <div class="greeting-time" id="greetingTime">下午好</div>
            <h1 class="greeting-name" id="greetingName">你好</h1>
            <p class="greeting-sub">今天感觉如何？</p>
        </header>
        
        <div class="time-display">
            <div class="time-dot"></div>
            <div class="time-text" id="beijingTime">--:--:--</div>
        </div>
        
        <div class="section-title">今日数据</div>
        <div class="stats-grid">
            <div class="stat-card" onclick="showToast('步数详情')">
                <div class="stat-value">8,432<span class="stat-unit">步</span></div>
                <div class="stat-label">步数</div>
            </div>
            <div class="stat-card" onclick="showToast('卡路里详情')">
                <div class="stat-value">342<span class="stat-unit">千卡</span></div>
                <div class="stat-label">消耗</div>
            </div>
            <div class="stat-card" onclick="showToast('睡眠详情')">
                <div class="stat-value">7.5<span class="stat-unit">小时</span></div>
                <div class="stat-label">睡眠</div>
            </div>
            <div class="stat-card" onclick="showToast('饮水详情')">
                <div class="stat-value">1,200<span class="stat-unit">ml</span></div>
                <div class="stat-label">饮水</div>
            </div>
        </div>
        
        <div class="primary-action" onclick="showPage('chat')">
            <span class="primary-action-icon">💬</span>
            <span class="primary-action-text">开始对话</span>
        </div>
        
        <div class="section-title">快捷记录</div>
        <div class="actions-list">
            <div class="action-item" onclick="showToast('体重记录')">
                <div class="action-icon">⚖️</div>
                <div class="action-content">
                    <div class="action-title">记录体重</div>
                    <div class="action-subtitle">上次记录 3天前</div>
                </div>
                <div class="action-arrow">›</div>
            </div>
            <div class="action-item" onclick="showToast('饮食记录')">
                <div class="action-icon">🍽️</div>
                <div class="action-content">
                    <div class="action-title">记录饮食</div>
                    <div class="action-subtitle">今日已记录 2 餐</div>
                </div>
                <div class="action-arrow">›</div>
            </div>
            <div class="action-item" onclick="showToast('运动记录')">
                <div class="action-icon">🏃</div>
                <div class="action-content">
                    <div class="action-title">记录运动</div>
                    <div class="action-subtitle">今日运动 30 分钟</div>
                </div>
                <div class="action-arrow">›</div>
            </div>
        </div>
    </div>
    
    <!-- 聊天页面 -->
    <div class="page" id="page-chat">
        <div class="chat-header">
            <div class="chat-back" onclick="showPage('home')">←</div>
            <div class="chat-avatar">A</div>
            <div class="chat-info">
                <div class="chat-name">AMBROSE</div>
                <div class="chat-status"><span style="width:6px;height:6px;background:#30D158;border-radius:50%;display:inline-block;margin-right:4px;"></span>在线</div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-bubble">你好！我是AMBROSE，你的AI健康教练。今天有什么可以帮助你的吗？</div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." autocomplete="off">
                <button class="chat-send" id="chatSend" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-items">
            <div class="nav-item active" onclick="showPage('home')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </div>
            <div class="nav-item" onclick="showToast('数据页面开发中')">
                <span class="nav-icon">📊</span>
                <span class="nav-label">数据</span>
            </div>
            <div class="nav-item" onclick="showPage('chat')">
                <span class="nav-icon">💬</span>
                <span class="nav-label">对话</span>
            </div>
            <div class="nav-item" onclick="showToast('我的页面开发中')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">我的</span>
            </div>
        </div>
    </nav>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 配置
        const CONFIG = {
            INVITE_CODE: '8888',
            VERIFY_CODE: '0812'
        };
        
        // Toast提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 页面切换
        function showPage(page) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面
            document.getElementById('page-' + page).classList.add('active');
            // 更新导航
            document.querySelectorAll('.nav-item').forEach((item, index) => {
                item.classList.remove('active');
                if ((page === 'home' && index === 0) || (page === 'chat' && index === 2)) {
                    item.classList.add('active');
                }
            });
            // 聊天页面隐藏底部导航
            document.getElementById('bottomNav').style.display = page === 'chat' ? 'none' : 'flex';
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const beijing = new Date(utc + (3600000 * 8));
            const time = beijing.toTimeString().slice(0, 8);
            document.getElementById('beijingTime').textContent = time;
            
            // 问候语
            const hour = beijing.getHours();
            let greeting = '你好';
            if (hour < 12) greeting = '早上好';
            else if (hour < 18) greeting = '下午好';
            else greeting = '晚上好';
            document.getElementById('greetingTime').textContent = greeting;
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            const container = document.getElementById('chatMessages');
            
            // 用户消息
            container.innerHTML += '<div class="message user"><div class="message-bubble">' + text + '</div></div>';
            input.value = '';
            container.scrollTop = container.scrollHeight;
            
            // AI回复
            setTimeout(() => {
                container.innerHTML += '<div class="message ai"><div class="message-bubble">收到！我会帮你记录下来。</div></div>';
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }
        
        // 回车发送
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // 认证
        document.getElementById('authBtn').addEventListener('click', () => {
            const code = document.getElementById('inviteCode').value;
            const verify = document.getElementById('verifyCode').value;
            
            if (code !== CONFIG.INVITE_CODE) {
                showToast('邀请码错误');
                return;
            }
            
            // 隐藏认证
            document.getElementById('authScreen').classList.add('hidden');
            // 显示首页
            document.getElementById('page-home').classList.add('active');
            
            // 设置名字
            const isBoss = verify === CONFIG.VERIFY_CODE;
            document.getElementById('greetingName').textContent = isBoss ? 'BOSS Shao' : '朋友';
            
            localStorage.setItem('ambrose_user', isBoss ? 'boss' : 'guest');
        });
        
        // 邀请码输入处理
        document.getElementById('inviteCode').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (e.target.value === CONFIG.INVITE_CODE) {
                document.getElementById('verifyCode').classList.remove('hidden');
            }
        });
        
        // 检查已登录
        const savedUser = localStorage.getItem('ambrose_user');
        if (savedUser) {
            document.getElementById('authScreen').classList.add('hidden');

            document.getElementById('greetingName').textContent = savedUser === 'boss' ? 'BOSS Shao' : '朋友';
