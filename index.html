<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>AMBROSE | NEURAL LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff00a0;
            --accent: #b829dd;
            --warning: #ffaa00;
            --danger: #ff0040;
            --bg-dark: #050508;
            --bg-panel: rgba(10, 12, 20, 0.95);
            --bg-glass: rgba(15, 18, 30, 0.85);
            --text-primary: #ffffff;
            --text-secondary: #8899aa;
            --text-dim: #556677;
            --border-glow: rgba(0, 243, 255, 0.5);
            --shadow-primary: 0 0 20px rgba(0, 243, 255, 0.4);
            --shadow-secondary: 0 0 20px rgba(255, 0, 160, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            font-family: 'Noto Sans SC', 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }
        
        /* 动态背景 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 1000px;
            animation: grid-move 20s linear infinite;
        }
        
        @keyframes grid-move {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }
        
        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: float-up 10s infinite;
        }
        
        @keyframes float-up {
            0% { 
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { 
                transform: translateY(-100px) translateX(50px);
                opacity: 0;
            }
        }
        
        /* 扫描线 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        /* 容器 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            background: var(--bg-panel);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding: 12px 20px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-primary);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px var(--primary); }
            50% { box-shadow: 0 0 25px var(--primary), 0 0 40px var(--primary); }
        }
        
        .brand-text {
            font-family: 'Orbitron', monospace;
        }
        
        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 40px var(--primary);
        }
        
        .brand-sub {
            font-size: 10px;
            color: var(--secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        /* 时钟显示 */
        .clock-display {
            font-family: 'Orbitron', monospace;
            text-align: right;
        }
        
        .clock-time {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 3px;
            text-shadow: 
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 40px var(--primary);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { 
                text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            }
            50% { 
                text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary), 0 0 60px var(--primary);
            }
        }
        
        .clock-date {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        .clock-label {
            font-size: 9px;
            color: var(--secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(180deg, var(--bg-dark) 0%, rgba(5, 5, 8, 0.9) 100%);
        }
        
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }
        
        /* 系统消息 */
        .system-msg {
            text-align: center;
            margin: 16px 0;
            font-size: 11px;
            color: var(--text-dim);
            font-family: 'Rajdhani', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* 消息气泡 */
        .message {
            display: flex;
            margin-bottom: 16px;
            animation: message-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: transform 0.2s ease;
        }
        
        .message:hover {
            transform: translateY(-2px);
        }
        
        @keyframes message-pop {
            0% { 
                opacity: 0; 
                transform: translateY(20px) scale(0.9);
            }
            70% {
                transform: translateY(-4px) scale(1.02);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            border: 2px solid;
            background: var(--bg-panel);
        }
        
        .message.user .msg-avatar {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        .message.bot .msg-avatar {
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 10px rgba(255, 0, 160, 0.3);
        }
        
        .msg-content {
            max-width: 75%;
            margin: 0 12px;
        }
        
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        .message.user .msg-bubble {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 243, 255, 0.05));
            border: 1px solid rgba(0, 243, 255, 0.4);
            box-shadow: 
                0 4px 15px rgba(0, 243, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .message.user:hover .msg-bubble {
            box-shadow: 
                0 8px 25px rgba(0, 243, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 243, 255, 0.6);
            transform: translateY(-1px);
        }
        
        .message.bot .msg-bubble {
            background: linear-gradient(135deg, rgba(255, 0, 160, 0.15), rgba(255, 0, 160, 0.05));
            border: 1px solid rgba(255, 0, 160, 0.4);
            box-shadow: 
                0 4px 15px rgba(255, 0, 160, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .message.bot:hover .msg-bubble {
            box-shadow: 
                0 8px 25px rgba(255, 0, 160, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 0, 160, 0.6);
            transform: translateY(-1px);
        }
        
        .msg-text {
            color: var(--text-primary);
        }
        
        .msg-meta {
            font-family: 'Rajdhani', monospace;
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .msg-time {
            letter-spacing: 1px;
        }
        
        .msg-status {
            color: var(--primary);
            font-size: 9px;
        }
        
        /* 加载动画 - 科技风 */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 8px;
            align-items: center;
        }
        
        .typing-bar {
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--secondary), var(--accent));
            border-radius: 2px;
            animation: cyber-wave 1.2s ease-in-out infinite;
        }
        
        .typing-bar:nth-child(2) { animation-delay: 0.1s; }
        .typing-bar:nth-child(3) { animation-delay: 0.2s; }
        
        @keyframes cyber-wave {
            0%, 60%, 100% { 
                transform: scaleY(0.6);
                opacity: 0.4;
            }
            30% { 
                transform: scaleY(1);
                opacity: 1;
            }
        }
        
        /* 输入区域 */
        .input-container {
            background: var(--bg-panel);
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            backdrop-filter: blur(20px);
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg-glass);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            padding: 8px 12px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-wrapper:focus-within {
            box-shadow: 
                0 0 0 1px rgba(0, 243, 255, 0.5),
                0 0 30px rgba(0, 243, 255, 0.2),
                inset 0 2px 10px rgba(0, 0, 0, 0.2);
            border-color: rgba(0, 243, 255, 0.6);
        }
        
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
        }
        
        .message-input::placeholder {
            color: var(--text-dim);
        }
        
        .send-button {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 4px 15px rgba(0, 243, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 25px rgba(0, 243, 255, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        
        .send-button:active {
            transform: translateY(0) scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 243, 255, 0.3);
        }
        
        .send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 退出按钮 */
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 0, 160, 0.5);
            color: var(--secondary);
            font-family: 'Rajdhani', monospace;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 0, 160, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 160, 0.3);
        }
        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Rajdhani', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: status-pulse 2s ease-in-out infinite;
        }
        
        @keyframes status-pulse {
            0%, 100% { 
                opacity: 1;
                box-shadow: 0 0 10px #00ff88;
            }
            50% { 
                opacity: 0.6;
                box-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88;
            }
        }
        
        .network-icon {
            font-size: 12px;
            color: var(--primary);
            margin-left: 4px;
        }
        
        /* 版本标签 */
        .version-tag {
            font-family: 'Rajdhani', monospace;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 2px;
        }

    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>
    <div class="scanline"></div>
    
    <div class="app-container">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="brand">
                <div class="brand-icon">🧰</div>
                <div class="brand-text">
                    <div class="brand-name">AMBROSE</div>
                    <div class="version-tag">NEURAL LINK v2.0</div>
                </div>
            </div>
            
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>ONLINE</span>
                </div>
                
                <div class="clock-display">
                    <div class="clock-time" id="clock">--:--:--</div>
                    <div class="clock-date" id="date">----/--/--</div>
                </div>
                
                <span class="network-icon">📡</span>
                
                <button class="logout-btn" onclick="Auth.logout()">切换身份</button>
            </div>
        </div>
        
        <!-- 消息区域 -->
        <div class="messages-container" id="messages"></div>
        
        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="message-input" id="messageInput" placeholder="输入神经指令..." rows="1"></textarea>
                <button class="send-button" id="sendBtn">⚡</button>
            </div>
        </div>
    </div>
    
    <script>
        // 分层粒子系统 - 3层深度
        const particlesContainer = document.getElementById('particles');
        
        // 背景层 - 大粒子，慢速
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle layer-back';
            particle.style.cssText = `
                position: absolute;
                width: ${3 + Math.random() * 2}px;
                height: ${3 + Math.random() * 2}px;
                background: rgba(0, 243, 255, ${0.3 + Math.random() * 0.3});
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation: float-up ${12 + Math.random() * 8}s linear infinite;
                animation-delay: ${Math.random() * 10}s;
                filter: blur(1px);
            `;
            particlesContainer.appendChild(particle);
        }
        
        // 中景层 - 中粒子，中速
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle layer-mid';
            particle.style.cssText = `
                position: absolute;
                width: ${2 + Math.random() * 1.5}px;
                height: ${2 + Math.random() * 1.5}px;
                background: rgba(255, 0, 160, ${0.4 + Math.random() * 0.3});
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation: float-up ${8 + Math.random() * 6}s linear infinite;
                animation-delay: ${Math.random() * 8}s;
            `;
            particlesContainer.appendChild(particle);
        }
        
        // 前景层 - 小粒子，快速
        for (let i = 0; i < 5; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle layer-front';
            particle.style.cssText = `
                position: absolute;
                width: ${1 + Math.random()}px;
                height: ${1 + Math.random()}px;
                background: rgba(255, 255, 255, ${0.5 + Math.random() * 0.5});
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation: float-up ${5 + Math.random() * 4}s linear infinite;
                animation-delay: ${Math.random() * 5}s;
                box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
            `;
            particlesContainer.appendChild(particle);
        }
    </script>
    
    <script src="auth.js?v=4"></script>
    <script src="chat.js?v=4"></script>
</body>
</html>
