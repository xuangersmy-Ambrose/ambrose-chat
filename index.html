<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AMBROSE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-bg-primary: #000000;
            --glass-light: rgba(255, 255, 255, 0.06);
            --glass-medium: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00D4FF;
            --neon-magenta: #FF2D92;
            --neon-violet: #BF5AF2;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.70);
            --text-tertiary: rgba(255, 255, 255, 0.50);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 简化背景 - 静态渐变 */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255, 45, 146, 0.10) 0%, transparent 40%),
                #000;
        }
        
        /* 认证界面 */
        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.95);
            transition: opacity 0.3s ease;
        }
        
        .auth-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .auth-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #000;
        }
        
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .input-field {
            width: 100%;
            max-width: 280px;
            padding: 14px 16px;
            font-size: 17px;
            background: var(--glass-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            text-align: center;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: var(--neon-cyan);
        }
        
        .btn-primary {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            background: var(--neon-cyan);
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        /* 主应用 */
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
        }
        
        /* 头部 */
        .header {
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }
        
        .brand-text {
            font-size: 20px;
            font-weight: 700;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--glass-light);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-primary);
        }
        
        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            margin: 0 20px 16px;
            background: var(--glass-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
        }
        
        .status-time {
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            color: var(--neon-cyan);
            font-weight: 500;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #30D158;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        
        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 0 20px;
            overflow-y: auto;
        }
        
        /* 欢迎卡片 */
        .welcome-card {
            padding: 20px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(191, 90, 242, 0.08));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
        }
        
        .welcome-greeting {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--neon-cyan);
            margin-bottom: 6px;
        }
        
        .welcome-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .welcome-message {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 数据网格 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .glass-card {
            background: var(--glass-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            cursor: pointer;
        }
        
        .glass-card.large {
            grid-column: span 2;
        }
        
        .card-icon {
            width: 36px;
            height: 36px;
            background: var(--glass-medium);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .card-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }
        
        .card-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .card-value.small {
            font-size: 20px;
        }
        
        .card-unit {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 4px;
        }
        
        /* 快捷操作 */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            margin-top: 20px;
        }
        
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            background: var(--glass-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            cursor: pointer;
        }
        
        .action-icon {
            width: 44px;
            height: 44px;
            background: var(--glass-medium);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .action-label {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--glass-border);
        }
        
        .nav-items {
            display: flex;
            justify-content: space-around;
            max-width: 430px;
            margin: 0 auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .nav-item.active {
            opacity: 1;
        }
        
        .nav-item.active .nav-icon {
            color: var(--neon-cyan);
        }
        
        .nav-icon {
            font-size: 22px;
        }
        
        .nav-label {
            font-size: 10px;
        }
        
        /* 工具类 */
        .hidden {
            display: none !important;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(40, 40, 40, 0.95);
            padding: 14px 24px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 14px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <!-- 认证屏幕 -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-logo">A</div>
        <h1 class="auth-title">AMBROSE</h1>
        <p class="auth-subtitle">AI HEALTH COACH</p>
        <input type="text" class="input-field" id="inviteCode" placeholder="输入邀请码" maxlength="4">
        <input type="text" class="input-field hidden" id="verifyCode" placeholder="身份验证码" maxlength="4">
        <button class="btn-primary" id="authBtn">进入系统</button>
    </div>
    
    <!-- 主应用 -->
    <div class="app" id="mainApp">
        <header class="header">
            <div class="brand">
                <div class="brand-icon">A</div>
                <span class="brand-text">AMBROSE</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="healthBtn">❤️</button>
                <button class="icon-btn" id="settingsBtn">⚙️</button>
            </div>
        </header>
        
        <div class="status-bar">
            <div>
                <span class="status-dot"></span>
                <span style="font-size: 13px; color: var(--text-secondary);">系统在线</span>
            </div>
            <div class="status-time" id="beijingTime">--:--:--</div>
        </div>
        
        <main class="main-content">
            <div class="welcome-card">
                <div class="welcome-greeting">NEURAL LINK v3.0</div>
                <h2 class="welcome-name" id="userGreeting">你好</h2>
                <p class="welcome-message">我是你的AI健康教练。今天有什么可以帮助你的吗？</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="glass-card">
                    <div class="card-icon">👟</div>
                    <div class="card-label">步数</div>
                    <div class="card-value">
                        <span id="todaySteps">0</span><span class="card-unit">步</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">🔥</div>
                    <div class="card-label">消耗</div>
                    <div class="card-value small">
                        <span id="todayCalories">0</span><span class="card-unit">kcal</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">😴</div>
                    <div class="card-label">睡眠</div>
                    <div class="card-value small">
                        <span id="lastSleep">--</span><span class="card-unit">h</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">💧</div>
                    <div class="card-label">饮水</div>
                    <div class="card-value small">
                        <span id="todayWater">0</span><span class="card-unit">ml</span>
                    </div>
                </div>
            </div>
            
            <h3 class="section-title">快捷记录</h3>
            <div class="actions-grid">
                <div class="action-item" onclick="showToast('记录体重')">
                    <div class="action-icon">⚖️</div>
                    <span class="action-label">体重</span>
                </div>
                <div class="action-item" onclick="showToast('记录饮食')">
                    <div class="action-icon">🍽️</div>
                    <span class="action-label">饮食</span>
                </div>
                <div class="action-item" onclick="showToast('记录运动')">
                    <div class="action-icon">🏃</div>
                    <span class="action-label">运动</span>
                </div>
                <div class="action-item" onclick="showToast('记录睡眠')">
                    <div class="action-icon">🌙</div>
                    <span class="action-label">睡眠</span>
                </div>
            </div>
        </main>
        
        <nav class="bottom-nav">
            <div class="nav-items">
                <div class="nav-item active" data-page="home">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页</span>
                </div>
                <div class="nav-item" data-page="health">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">数据</span>
                </div>
                <div class="nav-item" data-page="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">对话</span>
                </div>
                <div class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">我的</span>
                </div>
            </div>
        </nav>
    </div>
    
    <script>
        // 北京时间更新
        function updateBeijingTime() {
            const timeEl = document.getElementById('beijingTime');
            if (!timeEl) return;
            const now = new Date();
            const beijingTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
            const hours = String(beijingTime.getHours()).padStart(2, '0');
            const minutes = String(beijingTime.getMinutes()).padStart(2, '0');
            const seconds = String(beijingTime.getSeconds()).padStart(2, '0');
            timeEl.textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // 认证系统
        function initAuth() {
            const authScreen = document.getElementById('authScreen');
            const inviteInput = document.getElementById('inviteCode');
            const verifyInput = document.getElementById('verifyCode');
            const authBtn = document.getElementById('authBtn');
            
            if (!inviteInput || !authBtn) return;
            
            inviteInput.addEventListener('input', (e) => {
                if (e.target.value === '8888') {
                    verifyInput.classList.remove('hidden');
                    if (verifyInput) verifyInput.focus();
                }
            });
            
            authBtn.addEventListener('click', () => {
                const invite = inviteInput.value;
                const verify = verifyInput ? verifyInput.value : '';
                
                if (invite === '8888') {
                    authScreen.classList.add('hidden');
                    if (verify === '0812') {
                        localStorage.setItem('ambrose_user_identity', 'boss');
                        updateGreeting('BOSS Shao');
                    } else {
                        localStorage.setItem('ambrose_user_identity', 'guest');
                        updateGreeting('朋友');
                    }
                } else {
                    inviteInput.style.borderColor = '#FF2D92';
                    setTimeout(() => {
                        inviteInput.style.borderColor = '';
                    }, 1000);
                }
            });
        }
        
        // 更新问候语
        function updateGreeting(name) {
            const el = document.getElementById('userGreeting');
            if (el) el.textContent = `你好，${name}`;
        }
        
        // Toast提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 1500);
        }
        
        // 底部导航
        function initNav() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }
        
        // 初始化 - 确保DOM加载完成
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        function initApp() {
            try {
                initAuth();
                initNav();
                updateBeijingTime();
                setInterval(updateBeijingTime, 1000);
                
                // 检查登录状态
                const identity = localStorage.getItem('ambrose_user_identity');
                if (identity) {
                    const authScreen = document.getElementById('authScreen');
                    if (authScreen) authScreen.classList.add('hidden');
                    updateGreeting(identity === 'boss' ? 'BOSS Shao' : '朋友');
                }
            } catch (e) {
                console.error('App init error:', e);
            }
        }
    </script>
</body>
</html>
