<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMBROSE</title>
<style>
body{margin:0;padding:20px;font-family:sans-serif;background:#000;color:#fff}
.header{margin-bottom:30px}
.time{color:#0ff;font-size:14px}
.greeting{font-size:28px;font-weight:bold;margin:10px 0}
.card{background:#222;padding:20px;margin:10px 0;border-radius:10px}
.btn{background:#0ff;color:#000;padding:15px;margin:10px 0;border-radius:8px;text-align:center;font-weight:bold}
</style>
</head>
<body>
<div class="header">
<div class="time" id="t">--:--</div>
<div class="greeting">你好</div>
<div style="color:#888">今天感觉如何？</div>
</div>

<div class="card">
<div style="font-size:24px;font-weight:bold">8,432</div>
<div style="color:#888">步数</div>
</div>

<div class="btn">💬 开始对话</div>
<div class="btn" style="background:#f0f">❤️ 健康中心</div>
<div class="btn" style="background:#0f0;color:#000">🥗 饮食记录</div>

<script>
var t=document.getElementById('t');
setInterval(function(){
var d=new Date();
t.textContent=(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
},1000);
</script>
</body>
</html>
