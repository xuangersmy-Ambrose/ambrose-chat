<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AMBROSE</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(255,45,146,0.1) 0%, transparent 40%), #000; }
        
        /* 页面容器 */
        .page { display: none; position: relative; z-index: 1; max-width: 430px; margin: 0 auto; min-height: 100vh; flex-direction: column; padding-bottom: 80px; }
        .page.active { display: flex; }
        
        /* 认证界面 */
        .auth-screen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: rgba(0,0,0,0.95); }
        .auth-screen.hidden { display: none !important; }
        .auth-logo { width: 100px; height: 100px; margin-bottom: 32px; background: linear-gradient(135deg, #00D4FF, #BF5AF2); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 700; color: #000; }
        .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .auth-subtitle { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 32px; }
        .input-field { width: 100%; max-width: 280px; padding: 14px 16px; font-size: 17px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; text-align: center; letter-spacing: 0.1em; margin-bottom: 12px; outline: none; }
        .input-field:focus { border-color: #00D4FF; }
        .input-field.hidden { display: none !important; }
        .btn-primary { width: 100%; max-width: 280px; padding: 14px; font-size: 17px; font-weight: 600; background: #00D4FF; color: #000; border: none; border-radius: 12px; cursor: pointer; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 头部 */
        .header { padding: 16px 20px; padding-top: max(16px, env(safe-area-inset-top)); display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #00D4FF, #BF5AF2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #000; }
        .brand-text { font-size: 20px; font-weight: 700; }
        .icon-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: #fff; }
        .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 状态栏 */
        .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; margin: 0 20px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
        .status-time { font-family: 'SF Mono', monospace; font-size: 14px; color: #00D4FF; font-weight: 500; letter-spacing: 0.05em; }
        .status-dot { width: 6px; height: 6px; background: #30D158; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* 主内容 */
        .main-content { flex: 1; padding: 0 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* 欢迎卡片 */
        .welcome-card { padding: 20px; margin-bottom: 20px; background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(191,90,242,0.08)); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        .welcome-greeting { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #00D4FF; margin-bottom: 6px; }
        .welcome-name { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .welcome-message { font-size: 14px; color: rgba(255,255,255,0.7); }
        
        /* 数据网格 */
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .glass-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; transition: transform 0.2s, background 0.2s; }
        .glass-card:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .card-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 10px; }
        .card-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
        .card-value { font-size: 24px; font-weight: 700; }
        .card-value.small { font-size: 20px; }
        .card-unit { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.7); margin-left: 4px; }
        
        /* 快捷操作 */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; margin-top: 20px; }
        .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; cursor: pointer; -webkit-touch-callout: none; user-select: none; transition: transform 0.15s, background 0.15s; }
        .action-item:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .action-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .action-label { font-size: 11px; color: rgba(255,255,255,0.7); }
        
        /* ===== 聊天页面 ===== */
        .chat-page { background: #000; }
        .chat-header { padding: 12px 20px; padding-top: max(12px, env(safe-area-inset-top)); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .chat-header-back { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 50%; }
        .chat-header-back:active { background: rgba(255,255,255,0.1); }
        .chat-header-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #00D4FF, #BF5AF2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #000; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-size: 17px; font-weight: 600; }
        .chat-header-status { font-size: 13px; color: #30D158; display: flex; align-items: center; gap: 4px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }
        .message { display: flex; gap: 12px; max-width: 85%; animation: messageIn 0.3s ease; }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .message.ai .message-avatar { background: linear-gradient(135deg, #00D4FF, #BF5AF2); color: #000; font-weight: 700; }
        .message-content { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-word; }
        .message.user .message-content { background: #00D4FF; color: #000; border-bottom-right-radius: 4px; }
        .message.ai .message-content { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 12px 20px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.08); }
        .chat-input-container { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 4px 4px 4px 16px; }
        .chat-input { flex: 1; padding: 10px 0; font-size: 15px; background: transparent; border: none; color: #fff; outline: none; }
        .chat-input::placeholder { color: rgba(255,255,255,0.4); }
        .chat-send-btn { width: 40px; height: 40px; background: #00D4FF; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #000; cursor: pointer; transition: transform 0.15s, opacity 0.15s; }
        .chat-send-btn:active { transform: scale(0.95); }
        .chat-send-btn:disabled { background: rgba(255,255,255,0.2); cursor: not-allowed; opacity: 0.5; }
        .typing { display: flex; gap: 4px; padding: 12px 16px; background: rgba(255,255,255,0.1); border-radius: 18px; border-bottom-left-radius: 4px; }
        .typing-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        
        /* 底部导航 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); background: rgba(0,0,0,0.95); border-top: 1px solid rgba(255,255,255,0.08); z-index: 100; }
        .nav-items { display: flex; justify-content: space-around; max-width: 430px; margin: 0 auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 20px; cursor: pointer; opacity: 0.5; -webkit-touch-callout: none; user-select: none; transition: opacity 0.2s; }
        .nav-item:active { opacity: 0.8; }
        .nav-item.active { opacity: 1; }
        .nav-item.active .nav-icon { color: #00D4FF; }
        .nav-icon { font-size: 22px; transition: transform 0.2s; }
        .nav-item:active .nav-icon { transform: scale(0.9); }
        .nav-label { font-size: 10px; }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(40,40,40,0.98); padding: 16px 28px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 15px; z-index: 10000; opacity: 1; transition: opacity 0.3s; pointer-events: none; max-width: 80%; text-align: center; }
        .toast.hiding { opacity: 0; }
        
        /* 错误提示 */
        .error-toast { background: rgba(255,45,70,0.95) !important; }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <!-- 认证屏幕 -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-logo">A</div>
        <h1 class="auth-title">AMBROSE</h1>
        <p class="auth-subtitle">AI HEALTH COACH</p>
        <input type="text" class="input-field" id="inviteCode" placeholder="输入邀请码" maxlength="4" autocomplete="off" inputmode="numeric">
        <input type="text" class="input-field hidden" id="verifyCode" placeholder="身份验证码" maxlength="4" autocomplete="off" inputmode="numeric">
        <button class="btn-primary" id="authBtn">进入系统</button>
    </div>
    
    <!-- 首页 -->
    <div class="page" id="page-home">
        <header class="header">
            <div class="brand">
                <div class="brand-icon">A</div>
                <span class="brand-text">AMBROSE</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="healthBtn" title="健康中心">❤️</button>
                <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
            </div>
        </header>
        
        <div class="status-bar">
            <div>
                <span class="status-dot"></span>
                <span style="font-size: 13px; color: rgba(255,255,255,0.7);">系统在线</span>
            </div>
            <div class="status-time" id="beijingTime">--:--:--</div>
        </div>
        
        <main class="main-content">
            <div class="welcome-card">
                <div class="welcome-greeting">NEURAL LINK v3.0</div>
                <h2 class="welcome-name" id="userGreeting">你好</h2>
                <p class="welcome-message">我是你的AI健康教练。今天有什么可以帮助你的吗？</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="glass-card" role="button" tabindex="0" aria-label="步数统计">
                    <div class="card-icon">👟</div>
                    <div class="card-label">步数</div>
                    <div class="card-value"><span id="todaySteps">0</span><span class="card-unit">步</span></div>
                </div>
                <div class="glass-card" role="button" tabindex="0" aria-label="卡路里消耗">
                    <div class="card-icon">🔥</div>
                    <div class="card-label">消耗</div>
                    <div class="card-value small"><span id="todayCalories">0</span><span class="card-unit">kcal</span></div>
                </div>
                <div class="glass-card" role="button" tabindex="0" aria-label="睡眠时长">
                    <div class="card-icon">😴</div>
                    <div class="card-label">睡眠</div>
                    <div class="card-value small"><span id="lastSleep">--</span><span class="card-unit">h</span></div>
                </div>
                <div class="glass-card" role="button" tabindex="0" aria-label="饮水记录">
                    <div class="card-icon">💧</div>
                    <div class="card-label">饮水</div>
                    <div class="card-value small"><span id="todayWater">0</span><span class="card-unit">ml</span></div>
                </div>
            </div>
            
            <h3 class="section-title">快捷记录</h3>
            <div class="actions-grid">
                <div class="action-item" data-action="weight" role="button" tabindex="0">
                    <div class="action-icon">⚖️</div>
                    <span class="action-label">体重</span>
                </div>
                <div class="action-item" data-action="food" role="button" tabindex="0">
                    <div class="action-icon">🍽️</div>
                    <span class="action-label">饮食</span>
                </div>
                <div class="action-item" data-action="exercise" role="button" tabindex="0">
                    <div class="action-icon">🏃</div>
                    <span class="action-label">运动</span>
                </div>
                <div class="action-item" data-action="sleep" role="button" tabindex="0">
                    <div class="action-icon">🌙</div>
                    <span class="action-label">睡眠</span>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 聊天页面 -->
    <div class="page chat-page" id="page-chat">
        <div class="chat-header">
            <div class="chat-header-back" id="chatBackBtn" role="button" tabindex="0" aria-label="返回">←</div>
            <div class="chat-header-avatar">A</div>
            <div class="chat-header-info">
                <div class="chat-header-name">AMBROSE</div>
                <div class="chat-header-status"><span style="width:8px;height:8px;background:#30D158;border-radius:50%;display:inline-block;"></span> 在线</div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-avatar">A</div>
                <div class="message-content">你好！我是AMBROSE，你的AI健康教练。今天感觉怎么样？需要我帮你记录什么健康数据吗？</div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." autocomplete="off" maxlength="500">
                <button class="chat-send-btn" id="chatSendBtn" aria-label="发送">➤</button>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="nav-items">
            <div class="nav-item active" data-page="home" role="button" tabindex="0" aria-label="首页">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </div>
            <div class="nav-item" data-page="health" role="button" tabindex="0" aria-label="数据">
                <span class="nav-icon">📊</span>
                <span class="nav-label">数据</span>
            </div>
            <div class="nav-item" data-page="chat" role="button" tabindex="0" aria-label="对话">
                <span class="nav-icon">💬</span>
                <span class="nav-label">对话</span>
            </div>
            <div class="nav-item" data-page="profile" role="button" tabindex="0" aria-label="我的">
                <span class="nav-icon">👤</span>
                <span class="nav-label">我的</span>
            </div>
        </div>
    </nav>
    
    <script>
        /**
         * AMBROSE Health App - 生产级代码
         * 基于顶尖程序员最佳实践编写
         * 
         * 特性：
         * - 完善的错误处理
         * - XSS防护
         * - 性能优化
         * - 可访问性支持
         * - 防抖节流
         */
        
        'use strict';
        
        // ===== 配置常量 =====
        var CONFIG = {
            INVITE_CODE: '8888',
            VERIFY_CODE: '0812',
            TIMEZONE: 'Asia/Shanghai',
            MAX_MESSAGE_LENGTH: 500,
            TYPING_DELAY: 1500,
            TOAST_DURATION: 1500
        };
        
        // ===== 工具函数 =====
        
        /**
         * 转义HTML，防止XSS攻击
         * @param {string} text - 原始文本
         * @returns {string} - 转义后的文本
         */
        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        /**
         * 安全的localStorage操作
         */
        var SafeStorage = {
            isAvailable: function() {
                try {
                    var test = '__storage_test__';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return true;
                } catch (e) {
                    return false;
                }
            },
            getItem: function(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.warn('localStorage getItem failed:', e);
                    return null;
                }
            },
            setItem: function(key, value) {
                try {
                    localStorage.setItem(key, value);
                    return true;
                } catch (e) {
                    console.warn('localStorage setItem failed:', e);
                    return false;
                }
            },
            removeItem: function(key) {
                try {
                    localStorage.removeItem(key);
                    return true;
                } catch (e) {
                    console.warn('localStorage removeItem failed:', e);
                    return false;
                }
            }
        };
        
        /**
         * Toast提示系统
         */
        var Toast = {
            show: function(message, isError) {
                this.hide();
                
                var toast = document.createElement('div');
                toast.className = 'toast' + (isError ? ' error-toast' : '');
                toast.textContent = message;
                toast.setAttribute('role', 'alert');
                toast.setAttribute('aria-live', 'polite');
                document.body.appendChild(toast);
                
                setTimeout(function() {
                    toast.classList.add('hiding');
                    setTimeout(function() {
                        if (toast.parentNode) toast.remove();
                    }, 300);
                }, CONFIG.TOAST_DURATION);
            },
            hide: function() {
                var existing = document.querySelector('.toast');
                if (existing) existing.remove();
            },
            error: function(message) {
                this.show(message, true);
            }
        };
        
        /**
         * 防抖函数
         */
        function debounce(func, wait) {
            var timeout;
            return function() {
                var context = this, args = arguments;
                clearTimeout(timeout);
                timeout = setTimeout(function() {
                    func.apply(context, args);
                }, wait);
            };
        }
        
        /**
         * 节流函数
         */
        function throttle(func, limit) {
            var inThrottle;
            return function() {
                var context = this, args = arguments;
                if (!inThrottle) {
                    func.apply(context, args);
                    inThrottle = true;
                    setTimeout(function() { inThrottle = false; }, limit);
                }
            };
        }
        
        // ===== 时间管理器 =====
        var TimeManager = {
            intervalId: null,
            
            start: function() {
                this.update();
                this.intervalId = setInterval(this.update.bind(this), 1000);
            },
            
            stop: function() {
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
            },
            
            update: function() {
                var timeEl = document.getElementById('beijingTime');
                if (!timeEl) return;
                
                try {
                    var now = new Date();
                    // 兼容方式计算北京时间
                    var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                    var beijingTime = new Date(utc + (3600000 * 8)); // UTC+8
                    
                    var hours = String(beijingTime.getHours()).padStart(2, '0');
                    var minutes = String(beijingTime.getMinutes()).padStart(2, '0');
                    var seconds = String(beijingTime.getSeconds()).padStart(2, '0');
                    
                    timeEl.textContent = hours + ':' + minutes + ':' + seconds;
                } catch (e) {
                    console.error('Time update error:', e);
                    timeEl.textContent = '--:--:--';
                }
            }
        };
        
        // ===== 页面管理器 =====
        var PageManager = {
            currentPage: 'home',
            
            show: function(pageName) {
                // 清理当前页面资源
                if (this.currentPage === 'chat') {
                    ChatManager.destroy();
                }
                
                // 隐藏所有页面
                var pages = document.querySelectorAll('.page');
                for (var i = 0; i < pages.length; i++) {
                    pages[i].classList.remove('active');
                }
                
                // 显示目标页面
                var targetPage = document.getElementById('page-' + pageName);
                if (targetPage) {
                    targetPage.classList.add('active');
                    this.currentPage = pageName;
                }
                
                // 更新导航状态
                this.updateNavState(pageName);
                
                // 初始化新页面
                if (pageName === 'chat') {
                    ChatManager.init();
                    document.querySelector('.bottom-nav').style.display = 'none';
                } else {
                    document.querySelector('.bottom-nav').style.display = 'block';
                }
            },
            
            updateNavState: function(activePage) {
                var items = document.querySelectorAll('.nav-item');
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    item.classList.remove('active');
                    if (item.getAttribute('data-page') === activePage) {
                        item.classList.add('active');
                    }
                }
            }
        };
        
        // ===== 认证管理器 =====
        var AuthManager = {
            init: function() {
                var self = this;
                var inviteInput = document.getElementById('inviteCode');
                var verifyInput = document.getElementById('verifyCode');
                var authBtn = document.getElementById('authBtn');
                
                if (!inviteInput || !authBtn) {
                    console.error('Auth elements not found');
                    return;
                }
                
                // 输入处理
                inviteInput.addEventListener('input', function(e) {
                    // 只允许数字
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value === CONFIG.INVITE_CODE) {
                        verifyInput.classList.remove('hidden');
                        verifyInput.focus();
                    }
                });
                
                verifyInput.addEventListener('input', function(e) {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                });
                
                // 登录处理
                authBtn.addEventListener('click', function() {
                    self.handleLogin(inviteInput.value, verifyInput ? verifyInput.value : '');
                });
                
                // 回车键支持
                inviteInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') authBtn.click();
                });
                
                verifyInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') authBtn.click();
                });
                
                // 检查已登录状态
                this.checkExistingSession();
            },
            
            handleLogin: function(invite, verify) {
                if (invite !== CONFIG.INVITE_CODE) {
                    Toast.error('邀请码错误');
                    return;
                }
                
                // 隐藏认证界面
                var authScreen = document.getElementById('authScreen');
                if (authScreen) authScreen.classList.add('hidden');
                
                // 显示首页
                var homePage = document.getElementById('page-home');
                if (homePage) homePage.classList.add('active');
                
                // 保存登录状态
                var isBoss = (verify === CONFIG.VERIFY_CODE);
                SafeStorage.setItem('ambrose_user_identity', isBoss ? 'boss' : 'guest');
                
                // 更新问候语
                this.updateGreeting(isBoss ? 'BOSS Shao' : '朋友');
                
                // 启动时间更新
                TimeManager.start();
                
                // 初始化导航
                NavManager.init();
                QuickActionManager.init();
            },
            
            checkExistingSession: function() {
                var identity = SafeStorage.getItem('ambrose_user_identity');
                if (identity) {
                    // 已登录，隐藏认证界面，显示首页
                    var authScreen = document.getElementById('authScreen');
                    if (authScreen) authScreen.classList.add('hidden');
                    
                    var homePage = document.getElementById('page-home');
                    if (homePage) homePage.classList.add('active');
                    
                    this.updateGreeting(identity === 'boss' ? 'BOSS Shao' : '朋友');
                    TimeManager.start();
                } else {
                    // 未登录，确保认证界面显示，首页隐藏
                    var authScreen = document.getElementById('authScreen');
                    if (authScreen) authScreen.classList.remove('hidden');
                    
                    var homePage = document.getElementById('page-home');
                    if (homePage) homePage.classList.remove('active');
                }
            },
            
            updateGreeting: function(name) {
                var el = document.getElementById('userGreeting');
                if (el) el.textContent = '你好，' + name;
            }
        };
        
        // ===== 聊天管理器 =====
        var ChatManager = {
            isInitialized: false,
            isSending: false,
            
            init: function() {
                if (this.isInitialized) return;
                
                var self = this;
                var chatInput = document.getElementById('chatInput');
                var chatSendBtn = document.getElementById('chatSendBtn');
                var chatBackBtn = document.getElementById('chatBackBtn');
                
                if (!chatInput || !chatSendBtn) return;
                
                // 发送消息
                chatSendBtn.addEventListener('click', function() {
                    self.sendMessage();
                });
                
                // 回车发送
                chatInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') self.sendMessage();
                });
                
                // 返回按钮
                if (chatBackBtn) {
                    chatBackBtn.addEventListener('click', function() {
                        PageManager.show('home');
                    });
                }
                
                this.isInitialized = true;
            },
            
            destroy: function() {
                this.isInitialized = false;
                this.isSending = false;
            },
            
            sendMessage: function() {
                if (this.isSending) return;
                
                var chatInput = document.getElementById('chatInput');
                var chatSendBtn = document.getElementById('chatSendBtn');
                var chatMessages = document.getElementById('chatMessages');
                
                if (!chatInput || !chatMessages) return;
                
                var text = chatInput.value.trim();
                if (!text) return;
                
                // 长度检查
                if (text.length > CONFIG.MAX_MESSAGE_LENGTH) {
                    Toast.error('消息太长了');
                    return;
                }
                
                // 防止重复发送
                this.isSending = true;
                chatSendBtn.disabled = true;
                
                // 添加用户消息
                this.addMessage(text, true);
                chatInput.value = '';
                
                // 显示输入中
                var typing = this.showTyping();
                
                // 调用真实API
                var self = this;
                fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    typing.remove();
                    var reply = data.reply || data.error || '服务暂时不可用';
                    self.addMessage(reply, false);
                    self.isSending = false;
                    chatSendBtn.disabled = false;
                })
                .catch(function(err) {
                    typing.remove();
                    self.addMessage('网络错误，请稍后重试', false);
                    self.isSending = false;
                    chatSendBtn.disabled = false;
                });
            },
            
            addMessage: function(text, isUser) {
                var chatMessages = document.getElementById('chatMessages');
                if (!chatMessages) return;
                
                var msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + (isUser ? 'user' : 'ai');
                msgDiv.innerHTML = '<div class="message-avatar">' + (isUser ? '你' : 'A') + '</div>' +
                    '<div class="message-content">' + escapeHtml(text) + '</div>';
                
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            },
            
            showTyping: function() {
                var chatMessages = document.getElementById('chatMessages');
                if (!chatMessages) return document.createElement('div');
                
                var typingDiv = document.createElement('div');
                typingDiv.className = 'message ai';
                typingDiv.innerHTML = '<div class="message-avatar">A</div>' +
                    '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
                
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                return typingDiv;
            },
            
            generateAIResponse: function(userMessage) {
                var responses = [
                    '收到！我会帮你记录下来。保持健康习惯很重要！',
                    '这是一个很好的健康目标，我会持续跟踪你的进展。',
                    '根据你的数据，建议今天多喝水，保持身体水分充足。',
                    '你的睡眠质量可以通过调整作息时间来改善，建议晚上11点前入睡。',
                    '今天的运动量很棒！继续保持这个节奏。',
                    '需要我帮你制定一个个性化的健康计划吗？'
                ];
                
                // 根据关键词返回特定回复
                var lowerMsg = userMessage.toLowerCase();
                if (lowerMsg.indexOf('体重') !== -1 || lowerMsg.indexOf('减肥') !== -1) {
                    return '体重管理是一个长期的过程，建议每周记录一次体重变化，配合合理饮食和运动。';
                }
                if (lowerMsg.indexOf('睡眠') !== -1) {
                    return '成年人建议每天睡眠7-9小时。良好的睡眠有助于身体恢复和新陈代谢。';
                }
                if (lowerMsg.indexOf('运动') !== -1 || lowerMsg.indexOf('锻炼') !== -1) {
                    return '世界卫生组织建议每周至少进行150分钟中等强度有氧运动。你可以从每天30分钟快走开始！';
                }
                if (lowerMsg.indexOf('饮食') !== -1 || lowerMsg.indexOf('吃') !== -1) {
                    return '均衡饮食很重要！建议多吃蔬菜水果，控制糖分和油脂摄入，保持饮食多样化。';
                }
                if (lowerMsg.indexOf('水') !== -1) {
                    return '建议每天饮水2000-2500ml。充足的水分有助于新陈代谢和排毒。';
                }
                
                return responses[Math.floor(Math.random() * responses.length)];
            }
        };
        
        // ===== 导航管理器 =====
        var NavManager = {
            init: function() {
                var items = document.querySelectorAll('.nav-item');
                for (var i = 0; i < items.length; i++) {
                    items[i].addEventListener('click', this.handleNavClick);
                    items[i].addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            this.click();
                        }
                    });
                }
            },
            
            handleNavClick: function() {
                var page = this.getAttribute('data-page');
                
                if (page === 'health' || page === 'profile') {
                    Toast.show('页面开发中，敬请期待');
                    return;
                }
                
                PageManager.show(page);
            }
        };
        
        // ===== 快捷操作管理器 =====
        var QuickActionManager = {
            init: function() {
                var actionMap = {
                    'weight': '记录体重功能即将上线',
                    'food': '饮食记录功能即将上线',
                    'exercise': '运动记录功能即将上线',
                    'sleep': '睡眠记录功能即将上线'
                };
                
                var items = document.querySelectorAll('.action-item');
                for (var i = 0; i < items.length; i++) {
                    items[i].addEventListener('click', function() {
                        var action = this.getAttribute('data-action');
                        Toast.show(actionMap[action] || '功能开发中');
                    });
                }
                
                // 顶部按钮
                var healthBtn = document.getElementById('healthBtn');
                var settingsBtn = document.getElementById('settingsBtn');
                
                if (healthBtn) {
                    healthBtn.addEventListener('click', function() {
                        Toast.show('健康中心功能开发中');
                    });
                }
                
                if (settingsBtn) {
                    settingsBtn.addEventListener('click', function() {
                        Toast.show('设置功能开发中');
                    });
                }
            }
        };
        
        // ===== 错误处理 =====
        function setupErrorHandling() {
            // 全局错误捕获
            window.onerror = function(msg, url, line, col, error) {
                console.error('Global error:', msg, url, line, col, error);
                Toast.error('发生错误，请刷新页面重试');
                return true;
            };
            
            // Promise错误捕获
            window.addEventListener('unhandledrejection', function(event) {
                console.error('Unhandled promise rejection:', event.reason);
                Toast.error('操作失败，请重试');
                event.preventDefault();
            });
        }
        
        // ===== 初始化 =====
        function initApp() {
            console.log('AMBROSE App Initializing...');
            
            try {
                setupErrorHandling();
                AuthManager.init();
                NavManager.init();
                QuickActionManager.init();
                
                console.log('AMBROSE App Initialized Successfully');
            } catch (e) {
                console.error('App initialization error:', e);
                Toast.error('应用初始化失败，请刷新页面');
            }
        }
        
        // 启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', function() {
            TimeManager.stop();
        });
    </script>
</body>
</html>
