<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMBROSE Test</title>
<style>
body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
.auth { text-align: center; padding: 50px 20px; }
.logo { width: 80px; height: 80px; background: linear-gradient(135deg, #00D4FF, #FF2D92); border-radius: 20px; margin: 0 auto 20px; line-height: 80px; font-size: 32px; font-weight: bold; color: #000; }
h1 { margin: 0 0 10px; }
p { color: rgba(255,255,255,0.5); margin: 0 0 30px; }
input { display: block; width: 100%; max-width: 280px; margin: 0 auto 10px; padding: 15px; font-size: 17px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; text-align: center; }
button { display: block; width: 100%; max-width: 280px; margin: 0 auto; padding: 15px; font-size: 17px; font-weight: bold; background: #00D4FF; color: #000; border: none; border-radius: 10px; cursor: pointer; }
.hide { display: none; }
.page { display: none; }
.page.show { display: block; }
.stat { background: rgba(255,255,255,0.1); padding: 20px; margin: 10px; border-radius: 10px; display: inline-block; width: calc(50% - 30px); }
.nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.95); border-top: 1px solid rgba(255,255,255,0.1); }
.nav-item { text-align: center; cursor: pointer; opacity: 0.5; }
.nav-item.active { opacity: 1; }
</style>
</head>
<body>

<!-- 认证 -->
<div class="auth" id="auth">
  <div class="logo">A</div>
  <h1>AMBROSE</h1>
  <p>AI Health Coach</p>
  <input type="text" id="code1" placeholder="邀请码 8888" maxlength="4">
  <input type="text" id="code2" placeholder="验证码 0812" maxlength="4" class="hide">
  <button onclick="login()">进入</button>
</div>

<!-- 首页 -->
<div class="page" id="home">
  <h2 id="greet">你好</h2>
  <div style="padding: 20px;">
    <div class="stat" onclick="alert('步数')">
      <div style="font-size: 24px; font-weight: bold;">8,432</div>
      <div style="color: rgba(255,255,255,0.5);">步数</div>
    </div>
    <div class="stat" onclick="alert('卡路里')">
      <div style="font-size: 24px; font-weight: bold;">342</div>
      <div style="color: rgba(255,255,255,0.5);">千卡</div>
    </div>
  </div>
  <div style="padding: 20px; text-align: center;">
    <button onclick="showChat()" style="max-width: none;">开始对话</button>
  </div>
  <div class="nav">
    <div class="nav-item active" onclick="showHome()">🏠<br><small>首页</small></div>
    <div class="nav-item" onclick="alert('数据')">📊<br><small>数据</small></div>
    <div class="nav-item" onclick="showChat()">💬<br><small>对话</small></div>
    <div class="nav-item" onclick="alert('我的')">👤<br><small>我的</small></div>
  </div>
</div>

<!-- 聊天 -->
<div class="page" id="chat" style="padding-bottom: 80px;">
  <div style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
    <span onclick="showHome()" style="cursor: pointer;">← 返回</span>
    <span style="margin-left: 20px; font-weight: bold;">AMBROSE</span>
  </div>
  <div id="msgs" style="padding: 20px;">
    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 10px;">你好！我是AMBROSE</div>
  </div>
  <div style="position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px;">
    <input type="text" id="msg" placeholder="输入消息..." style="flex: 1; margin: 0; text-align: left;">
    <button onclick="send()" style="width: auto; padding: 15px 20px; margin: 0;">发送</button>
  </div>
</div>

<script>
function login() {
  var c1 = document.getElementById('code1').value;
  var c2 = document.getElementById('code2').value;
  if (c1 !== '8888') { alert('邀请码错误'); return; }
  document.getElementById('auth').classList.add('hide');
  document.getElementById('home').classList.add('show');
  localStorage.setItem('user', c2 === '0812' ? 'boss' : 'guest');
  document.getElementById('greet').textContent = (c2 === '0812' ? 'BOSS Shao' : '朋友') + '，你好';
}

document.getElementById('code1').oninput = function(e) {
  e.target.value = e.target.value.replace(/[^0-9]/g, '');
  if (e.target.value === '8888') document.getElementById('code2').classList.remove('hide');
};

if (localStorage.getItem('user')) {
  document.getElementById('auth').classList.add('hide');
  document.getElementById('home').classList.add('show');
  document.getElementById('greet').textContent = (localStorage.getItem('user') === 'boss' ? 'BOSS Shao' : '朋友') + '，你好';
}

function showHome() {
  document.getElementById('home').classList.add('show');
  document.getElementById('chat').classList.remove('show');
}

function showChat() {
  document.getElementById('home').classList.remove('show');
  document.getElementById('chat').classList.add('show');
}

function send() {
  var input = document.getElementById('msg');
  var text = input.value.trim();
  if (!text) return;
  document.getElementById('msgs').innerHTML += '<div style="text-align: right;"><div style="background: #00D4FF; color: #000; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 10px;">' + text + '</div></div>';
  input.value = '';
  setTimeout(function() {
    document.getElementById('msgs').innerHTML += '<div><div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 10px;">收到！</div></div>';
  }, 500);
}
</script>

</body>
</html>
