<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AMBROSE // CYBERPUNK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #b829dd;
            --neon-cyan: #00ffff;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --grid-color: rgba(0, 243, 255, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --glitch-red: #ff0040;
            --glitch-blue: #00ffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* 赛博朋克网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 扫描线效果 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scanline 8s linear infinite;
        }
        
        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        /* 容器 */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        /* 顶部标题栏 */
        .header {
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.8) 100%);
            border-bottom: 2px solid var(--neon-blue);
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }
        
        .header::before,
        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            width: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .header::before { left: 0; }
        .header::after { right: 0; }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .header-title {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px var(--neon-blue),
                0 0 20px var(--neon-blue),
                0 0 40px var(--neon-blue);
            animation: flicker 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            41% { opacity: 1; }
            42% { opacity: 0.8; }
            43% { opacity: 1; }
            45% { opacity: 0.3; }
            46% { opacity: 1; }
        }
        
        .header-subtitle {
            position: absolute;
            right: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: var(--neon-pink);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(180deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
        }
        
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: var(--darker-bg);
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 2px;
        }
        
        /* 时间戳 */
        .timestamp {
            text-align: center;
            color: var(--neon-purple);
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            margin: 20px 0;
            text-transform: uppercase;
            opacity: 0.7;
        }
        
        /* 消息气泡 */
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: slide-in 0.3s ease;
        }
        
        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message.user .bubble {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.15) 0%, rgba(0, 243, 255, 0.05) 100%);
            border: 1px solid var(--neon-blue);
            box-shadow: 
                0 0 10px rgba(0, 243, 255, 0.3),
                inset 0 0 20px rgba(0, 243, 255, 0.05);
        }
        
        .message.bot .bubble {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.15) 0%, rgba(255, 0, 255, 0.05) 100%);
            border: 1px solid var(--neon-pink);
            box-shadow: 
                0 0 10px rgba(255, 0, 255, 0.3),
                inset 0 0 20px rgba(255, 0, 255, 0.05);
        }
        
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            background: var(--darker-bg);
            border: 2px solid;
            box-shadow: 0 0 15px currentColor;
        }
        
        .message.user .avatar {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }
        
        .message.bot .avatar {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            animation: pulse-avatar 2s ease-in-out infinite;
        }
        
        @keyframes pulse-avatar {
            0%, 100% { box-shadow: 0 0 15px var(--neon-pink); }
            50% { box-shadow: 0 0 25px var(--neon-pink), 0 0 40px var(--neon-pink); }
        }
        
        .bubble {
            max-width: 75%;
            margin: 0 12px;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
        }
        
        .bubble .text {
            color: var(--text-primary);
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.1);
        }
        
        .bubble .time {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: right;
            letter-spacing: 1px;
            opacity: 0.6;
        }
        
        /* 加载动画 */
        .loading-msg .bubble {
            display: flex;
            gap: 6px;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(184, 41, 221, 0.2) 0%, rgba(184, 41, 221, 0.05) 100%);
            border-color: var(--neon-purple);
        }
        
        .dot {
            width: 10px;
            height: 10px;
            background: var(--neon-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-purple);
            animation: cyber-bounce 1.4s infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes cyber-bounce {
            0%, 60%, 100% { 
                transform: translateY(0);
                box-shadow: 0 0 10px var(--neon-purple);
            }
            30% { 
                transform: translateY(-12px);
                box-shadow: 0 0 20px var(--neon-purple), 0 0 40px var(--neon-purple);
            }
        }
        
        /* 输入区域 */
        .input-area {
            background: linear-gradient(0deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.8) 100%);
            border-top: 2px solid var(--neon-pink);
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            align-items: flex-end;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }
        
        .input-area::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple), var(--neon-blue));
            background-size: 300% 100%;
            animation: gradient-shift 3s linear infinite;
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        .input-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            line-height: 20px;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 
                inset 0 0 10px rgba(0, 243, 255, 0.1),
                0 0 10px rgba(0, 243, 255, 0.1);
            transition: all 0.3s;
        }
        
        .input-box:focus {
            border-color: var(--neon-cyan);
            box-shadow: 
                inset 0 0 15px rgba(0, 255, 255, 0.15),
                0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .input-box::placeholder {
            color: var(--text-secondary);
        }
        
        .send-btn {
            width: 64px;
            height: 44px;
            background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-purple) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 
                0 0 15px rgba(255, 0, 255, 0.4),
                inset 0 0 10px rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .send-btn:active {
            transform: scale(0.95);
            box-shadow: 
                0 0 25px rgba(255, 0, 255, 0.6),
                inset 0 0 15px rgba(255, 255, 255, 0.3);
        }
        
        .send-btn:disabled {
            background: #333;
            box-shadow: none;
            opacity: 0.5;
        }
        
        /* 退出按钮 */
        .logout-btn {
            position: absolute;
            right: 16px;
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: var(--neon-pink);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-pink);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-title">AMBROSE</span>
            <span class="header-subtitle">CYBERPUNK // 2088</span>
        </div>
        
        <div class="messages" id="messages">
            <div class="timestamp">SYSTEM ONLINE</div>
        </div>
        
        <div class="input-area">
            <textarea class="input-box" id="messageInput" placeholder="输入指令..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="chat.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init();
        });
    </script>
</body>
</html>
