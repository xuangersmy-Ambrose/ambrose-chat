<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AMBROSE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#000;color:#fff}
#auth{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:#000;z-index:100}
.logo{width:80px;height:80px;background:linear-gradient(135deg,#00D4FF,#FF2D92);border-radius:20px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:#000}
h1{font-size:28px;margin-bottom:8px}
p{color:rgba(255,255,255,0.5);margin-bottom:30px}
input{width:100%;max-width:280px;padding:15px;font-size:17px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;text-align:center;margin-bottom:10px}
button{width:100%;max-width:280px;padding:15px;font-size:17px;font-weight:bold;background:#00D4FF;color:#000;border:none;border-radius:10px;cursor:pointer}
.hide{display:none!important}
.screen{display:none;min-height:100vh;padding-bottom:80px}
.screen.active{display:block}
.header{padding:60px 20px 20px}
.time{color:#00D4FF;font-size:14px;margin-bottom:8px}
.greeting{font-size:32px;font-weight:bold;margin-bottom:8px}
.sub{color:rgba(255,255,255,0.5)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:20px}
.stat{background:rgba(255,255,255,0.08);padding:20px;border-radius:12px;text-align:center;cursor:pointer}
.stat-num{font-size:28px;font-weight:bold;margin-bottom:4px}
.stat-label{font-size:13px;color:rgba(255,255,255,0.5)}
.main-btn{background:#00D4FF;color:#000;padding:18px;margin:0 20px 20px;border-radius:12px;text-align:center;font-size:17px;font-weight:bold;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:15px;background:rgba(0,0,0,0.95);border-top:1px solid rgba(255,255,255,0.1)}
.nav-item{text-align:center;cursor:pointer;opacity:0.4;padding:8px 20px}
.nav-item.active{opacity:1}
.chat-header{display:flex;align-items:center;padding:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.back{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;margin-right:12px}
.chat-messages{padding:20px;min-height:calc(100vh - 180px)}
.msg{margin-bottom:16px;max-width:80%}
.msg.user{margin-left:auto;text-align:right}
.bubble{display:inline-block;padding:12px 16px;border-radius:18px;font-size:15px}
.msg.ai .bubble{background:rgba(255,255,255,0.1)}
.msg.user .bubble{background:#00D4FF;color:#000}
.chat-input{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 24px;background:#000;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:10px}
.chat-input input{flex:1;margin:0;text-align:left}
.chat-input button{width:auto;padding:15px 20px;margin:0}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(40,40,40,0.98);padding:16px 24px;border-radius:12px;color:#fff;font-size:15px;z-index:200;display:none}
.toast.show{display:block}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 认证 -->
<div id="auth">
<div class="logo">A</div>
<h1>AMBROSE</h1>
<p>AI Health Coach</p>
<input type="text" id="code1" placeholder="邀请码 8888" maxlength="4">
<input type="text" id="code2" placeholder="验证码 0812" maxlength="4" class="hide">
<button onclick="doLogin()">进入</button>
</div>

<!-- 首页 -->
<div class="screen" id="home">
<div class="header">
<div class="time" id="time">--:--</div>
<div class="greeting" id="greet">你好</div>
<div class="sub">今天感觉如何？</div>
</div>

<div class="stats">
<div class="stat" onclick="showToast('步数: 8,432步')"><div class="stat-num">8,432</div><div class="stat-label">步数</div></div>
<div class="stat" onclick="showToast('消耗: 342千卡')"><div class="stat-num">342</div><div class="stat-label">千卡</div></div>
<div class="stat" onclick="showToast('睡眠: 7.5小时')"><div class="stat-num">7.5</div><div class="stat-label">小时</div></div>
<div class="stat" onclick="showToast('饮水: 1.2L')"><div class="stat-num">1.2L</div><div class="stat-label">饮水</div></div>
</div>

<div class="main-btn" onclick="openChat()">💬 开始对话</div>

<div class="nav">
<div class="nav-item active" onclick="showToast('首页')">🏠<br><small>首页</small></div>
<div class="nav-item" onclick="showToast('数据页面开发中')">📊<br><small>数据</small></div>
<div class="nav-item" onclick="openChat()">💬<br><small>对话</small></div>
<div class="nav-item" onclick="showToast('我的页面开发中')">👤<br><small>我的</small></div>
</div>
</div>

<!-- 聊天 -->
<div class="screen" id="chat">
<div class="chat-header">
<div class="back" onclick="closeChat()">←</div>
<div><div style="font-weight:bold">AMBROSE</div><div style="font-size:13px;color:#30D158">● 在线</div></div>
</div>
<div class="chat-messages" id="msgs">
<div class="msg ai"><div class="bubble">你好！我是AMBROSE。</div></div>
</div>
<div class="chat-input">
<input type="text" id="msgIn" placeholder="输入消息...">
<button onclick="sendMsg()">发送</button>
</div>
</div>

<script>
// 显示提示
function showToast(msg){
var t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(function(){t.classList.remove('show');},2000);
}

// 更新时间
function updateTime(){
var now=new Date();
var utc=now.getTime()+now.getTimezoneOffset()*60000;
var bj=new Date(utc+3600000*8);
document.getElementById('time').textContent=bj.toTimeString().slice(0,5);
}
setInterval(updateTime,1000);
updateTime();

// 登录
function doLogin(){
var c1=document.getElementById('code1').value;
var c2=document.getElementById('code2').value;
if(c1!=='8888'){showToast('邀请码错误');return;}
document.getElementById('auth').style.display='none';
document.getElementById('home').classList.add('active');
localStorage.setItem('user',c2==='0812'?'boss':'guest');
document.getElementById('greet').textContent=(c2==='0812'?'BOSS Shao':'朋友')+'，你好';
}

// 邀请码输入
document.getElementById('code1').oninput=function(){
this.value=this.value.replace(/\D/g,'');
if(this.value==='8888')document.getElementById('code2').classList.remove('hide');
};

// 检查已登录
if(localStorage.getItem('user')){
document.getElementById('auth').style.display='none';
document.getElementById('home').classList.add('active');
document.getElementById('greet').textContent=(localStorage.getItem('user')==='boss'?'BOSS Shao':'朋友')+'，你好';
}

// 显示聊天
function openChat(){
document.getElementById('home').classList.remove('active');
document.getElementById('chat').classList.add('active');
}

// 关闭聊天
function closeChat(){
document.getElementById('chat').classList.remove('active');
document.getElementById('home').classList.add('active');
}

// 发送消息
function sendMsg(){
var input=document.getElementById('msgIn');
var text=input.value.trim();
if(!text)return;
document.getElementById('msgs').innerHTML+='<div class="msg user"><div class="bubble">'+text+'</div></div>';
input.value='';
setTimeout(function(){
document.getElementById('msgs').innerHTML+='<div class="msg ai"><div class="bubble">收到！</div></div>';
},500);
}

// 回车发送
document.getElementById('msgIn').onkeypress=function(e){
if(e.key==='Enter')sendMsg();
};
</script>

</body>
</html>
