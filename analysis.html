<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<title>健康分析 - AMBROSE</title>
<style>
:root {
  --primary: #00D4FF;
  --primary-dark: #0099CC;
  --secondary: #FF2D92;
  --bg-dark: #0a0a0a;
  --bg-card: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.1);
  --text-primary: #fff;
  --text-secondary: rgba(255,255,255,0.5);
  --success: #30D158;
  --warning: #FFD93D;
  --error: #FF6B6B;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-dark);
  color: #fff;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
::-webkit-scrollbar { width: 0; height: 0; }

/* 页面容器 */
.page { min-height: 100vh; padding-bottom: 100px; }

/* 头部 */
.page-header {
  padding: 60px 24px 20px;
  background: linear-gradient(180deg, rgba(0,212,255,0.1) 0%, transparent 100%);
}
.page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { color: var(--text-secondary); font-size: 14px; }

/* 返回按钮 */
.back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Tab导航 */
.tab-nav {
  display: flex;
  padding: 0 24px 20px;
  gap: 12px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 14px;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.3s;
}
.tab-btn.active {
  background: var(--primary);
  color: #000;
  border-color: var(--primary);
  font-weight: 600;
}

/* Tab内容 */
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* 周期选择器 */
.period-selector {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 20px 24px;
}
.period-btn {
  padding: 10px 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
}
.period-btn.active {
  background: var(--primary);
  color: #000;
  border-color: var(--primary);
}

/* 统计卡片 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 24px 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}
.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.stat-goal {
  font-size: 11px;
  color: var(--text-secondary);
}
.stat-goal .percent { color: var(--success); }

/* 洞察区域 */
.insights-section {
  margin: 0 24px 24px;
  padding: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.section-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.insight-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  margin-bottom: 8px;
}
.insight-item:last-child { margin-bottom: 0; }
.insight-item.positive { border-left: 3px solid var(--success); }
.insight-item.warning { border-left: 3px solid var(--warning); }
.insight-item.neutral { border-left: 3px solid var(--text-secondary); }
.insight-icon { font-size: 20px; }
.insight-text { font-size: 14px; line-height: 1.5; flex: 1; }

/* 图表容器 */
.chart-section {
  margin: 0 24px 24px;
  padding: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.chart-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-secondary);
}
.chart-container {
  height: 200px;
  position: relative;
}

/* AI报告样式 */
.report-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px 20px;
}
.report-date {
  font-size: 14px;
  color: var(--text-secondary);
}
.generate-btn {
  padding: 8px 16px;
  background: var(--primary);
  border: none;
  border-radius: 20px;
  color: #000;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* 评分圈 */
.scores-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding: 0 24px 24px;
}
.score-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.score-item.main {
  grid-column: span 2;
  flex-direction: row;
  justify-content: space-around;
}
.score-circle-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
}
.score-circle-bg {
  fill: none;
  stroke: rgba(255,255,255,0.1);
  stroke-width: 8;
}
.score-circle {
  fill: none;
  stroke: var(--primary);
  stroke-width: 8;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s ease;
}
.score-value {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  font-weight: 700;
}
.score-label {
  margin-top: 12px;
  font-size: 14px;
  color: var(--text-secondary);
}

/* 亮点和关注点 */
.list-section {
  margin: 0 24px 24px;
  padding: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.list-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
}
.highlight-item, .concern-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: rgba(48, 209, 88, 0.1);
  border-radius: 12px;
  margin-bottom: 8px;
}
.concern-item {
  background: rgba(255, 217, 61, 0.1);
}
.highlight-icon, .concern-icon {
  font-size: 20px;
}
.highlight-text, .concern-text {
  font-size: 14px;
  flex: 1;
}
.empty-state {
  text-align: center;
  padding: 20px;
  color: var(--text-secondary);
  font-size: 14px;
}

/* 建议卡片 */
.recommendations-section {
  margin: 0 24px 24px;
}
.rec-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
  transition: all 0.3s;
}
.rec-card:hover {
  border-color: var(--primary);
}
.rec-card.priority-high { border-left: 4px solid var(--error); }
.rec-card.priority-medium { border-left: 4px solid var(--warning); }
.rec-card.priority-low { border-left: 4px solid var(--success); }
.rec-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.rec-category {
  font-size: 12px;
  color: var(--primary);
  padding: 4px 10px;
  background: rgba(0,212,255,0.1);
  border-radius: 12px;
}
.rec-priority {
  font-size: 11px;
  color: var(--text-secondary);
}
.rec-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}
.rec-description {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
}
.rec-reason {
  font-size: 12px;
  color: var(--primary);
  padding: 8px 12px;
  background: rgba(0,212,255,0.05);
  border-radius: 8px;
}

/* 推送设置 */
.push-section {
  margin: 0 24px 24px;
}
.setting-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.setting-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.setting-title {
  font-size: 16px;
  font-weight: 600;
}
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 28px;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(255,255,255,0.2);
  border-radius: 28px;
  transition: 0.3s;
}
.toggle-slider:before {
  position: absolute;
  content: "";
  height: 22px;
  width: 22px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}
input:checked + .toggle-slider { background: var(--primary); }
input:checked + .toggle-slider:before { transform: translateX(22px); }

.option-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-top: 1px solid var(--border);
}
.option-row label { font-size: 14px; color: var(--text-secondary); }
.option-row select, .option-row input {
  padding: 8px 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
}

.btn-primary {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  border: none;
  border-radius: 12px;
  color: #000;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid var(--primary);
  border-radius: 12px;
  color: var(--primary);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

/* 底部按钮 */
.bottom-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px 24px 40px;
  background: linear-gradient(to top, var(--bg-dark), transparent);
  display: flex;
  gap: 12px;
}
.bottom-actions .btn-primary, .bottom-actions .btn-secondary {
  flex: 1;
}

/* Toast */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(40,40,40,0.98);
  padding: 16px 28px;
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  z-index: 10000;
  display: none;
  border: 1px solid rgba(255,255,255,0.1);
}
.toast.show { display: block; animation: toastIn 0.3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }
.toast.error { background: rgba(231, 76, 60, 0.95); }
</style>
</head>

<script>
// Tab切换
function initTabs() {
  const tabBtns = document.querySelectorAll('.tab-nav .tab-btn:not(.filter-btn)');
  const tabContents = document.querySelectorAll('.tab-content');
  
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tabId = btn.dataset.tab + 'Tab';
      
      // 更新按钮状态
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // 更新内容显示
      tabContents.forEach(content => {
        content.classList.toggle('active', content.id === tabId);
      });
      
      // 初始化对应模块
      if (tabId === 'trendsTab') {
        window.healthAnalytics?.init();
      } else if (tabId === 'reportTab') {
        window.dailyReportManager?.init();
      } else if (tabId === 'recommendationsTab') {
        window.recommendationEngine?.init();
      } else if (tabId === 'notificationsTab') {
        window.pushNotificationManager?.init();
      }
    });
  });
}

// 推送切换按钮
function initPushToggle() {
  const toggleBtn = document.getElementById('pushToggleBtn');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      if (window.pushNotificationManager?.isSubscribed) {
        window.pushNotificationManager.unsubscribe();
      } else {
        window.pushNotificationManager.subscribe();
      }
    });
  }
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', () => {
  initTabs();
  initPushToggle();
  
  // 默认加载趋势分析
  setTimeout(() => {
    window.healthAnalytics?.init();
  }, 100);
});
</script>
