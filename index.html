<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AMBROSE</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255, 45, 146, 0.10) 0%, transparent 40%),
                #000;
        }
        
        /* 认证界面 */
        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.95);
        }
        
        .auth-screen.hidden {
            display: none !important;
        }
        
        .auth-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00D4FF, #BF5AF2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #000;
        }
        
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .auth-subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
        }
        
        .input-field {
            width: 100%;
            max-width: 280px;
            padding: 14px 16px;
            font-size: 17px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            text-align: center;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #00D4FF;
        }
        
        .input-field.hidden {
            display: none !important;
        }
        
        .btn-primary {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            background: #00D4FF;
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        /* 主应用 */
        .app {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
        }
        
        /* 头部 */
        .header {
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00D4FF, #BF5AF2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }
        
        .brand-text {
            font-size: 20px;
            font-weight: 700;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
        }
        
        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            margin: 0 20px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
        }
        
        .status-time {
            font-family: monospace;
            font-size: 14px;
            color: #00D4FF;
            font-weight: 500;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #30D158;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        
        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 0 20px;
        }
        
        /* 欢迎卡片 */
        .welcome-card {
            padding: 20px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(191, 90, 242, 0.08));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        
        .welcome-greeting {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #00D4FF;
            margin-bottom: 6px;
        }
        
        .welcome-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .welcome-message {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        
        /* 数据网格 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .glass-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
        }
        
        .glass-card.large {
            grid-column: span 2;
        }
        
        .card-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .card-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
        }
        
        .card-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .card-value.small {
            font-size: 20px;
        }
        
        .card-unit {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            margin-left: 4px;
        }
        
        /* 快捷操作 */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            margin-top: 20px;
        }
        
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            cursor: pointer;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        .action-item:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.1);
        }
        
        .action-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .action-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .nav-items {
            display: flex;
            justify-content: space-around;
            max-width: 430px;
            margin: 0 auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 20px;
            cursor: pointer;
            opacity: 0.5;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        .nav-item:active {
            opacity: 0.8;
        }
        
        .nav-item.active {
            opacity: 1;
        }
        
        .nav-item.active .nav-icon {
            color: #00D4FF;
        }
        
        .nav-icon {
            font-size: 22px;
        }
        
        .nav-label {
            font-size: 10px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(40, 40, 40, 0.98);
            padding: 16px 28px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.3s;
        }
        
        .toast.hiding {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <!-- 认证屏幕 -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-logo">A</div>
        <h1 class="auth-title">AMBROSE</h1>
        <p class="auth-subtitle">AI HEALTH COACH</p>
        <input type="text" class="input-field" id="inviteCode" placeholder="输入邀请码" maxlength="4" autocomplete="off">
        <input type="text" class="input-field hidden" id="verifyCode" placeholder="身份验证码" maxlength="4" autocomplete="off">
        <button class="btn-primary" id="authBtn">进入系统</button>
    </div>
    
    <!-- 主应用 -->
    <div class="app" id="mainApp" style="display:none;">
        <header class="header">
            <div class="brand">
                <div class="brand-icon">A</div>
                <span class="brand-text">AMBROSE</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="healthBtn">❤️</button>
                <button class="icon-btn" id="settingsBtn">⚙️</button>
            </div>
        </header>
        
        <div class="status-bar">
            <div>
                <span class="status-dot"></span>
                <span style="font-size: 13px; color: rgba(255,255,255,0.7);">系统在线</span>
            </div>
            <div class="status-time" id="beijingTime">--:--:--</div>
        </div>
        
        <main class="main-content">
            <div class="welcome-card">
                <div class="welcome-greeting">NEURAL LINK v3.0</div>
                <h2 class="welcome-name" id="userGreeting">你好</h2>
                <p class="welcome-message">我是你的AI健康教练。今天有什么可以帮助你的吗？</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="glass-card">
                    <div class="card-icon">👟</div>
                    <div class="card-label">步数</div>
                    <div class="card-value">
                        <span id="todaySteps">0</span><span class="card-unit">步</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">🔥</div>
                    <div class="card-label">消耗</div>
                    <div class="card-value small">
                        <span id="todayCalories">0</span><span class="card-unit">kcal</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">😴</div>
                    <div class="card-label">睡眠</div>
                    <div class="card-value small">
                        <span id="lastSleep">--</span><span class="card-unit">h</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">💧</div>
                    <div class="card-label">饮水</div>
                    <div class="card-value small">
                        <span id="todayWater">0</span><span class="card-unit">ml</span>
                    </div>
                </div>
            </div>
            
            <h3 class="section-title">快捷记录</h3>
            <div class="actions-grid">
                <div class="action-item" data-action="weight">
                    <div class="action-icon">⚖️</div>
                    <span class="action-label">体重</span>
                </div>
                <div class="action-item" data-action="food">
                    <div class="action-icon">🍽️</div>
                    <span class="action-label">饮食</span>
                </div>
                <div class="action-item" data-action="exercise">
                    <div class="action-icon">🏃</div>
                    <span class="action-label">运动</span>
                </div>
                <div class="action-item" data-action="sleep">
                    <div class="action-icon">🌙</div>
                    <span class="action-label">睡眠</span>
                </div>
            </div>
        </main>
        
        <nav class="bottom-nav">
            <div class="nav-items">
                <div class="nav-item active" data-page="home">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页</span>
                </div>
                <div class="nav-item" data-page="health">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">数据</span>
                </div>
                <div class="nav-item" data-page="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">对话</span>
                </div>
                <div class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">我的</span>
                </div>
            </div>
        </nav>
    </div>
    
    <script>
        // 防止重复初始化
        window.appInitialized = window.appInitialized || false;
        
        function showToast(message) {
            console.log('Toast:', message);
            
            // 移除已存在的toast
            var existing = document.querySelector('.toast');
            if (existing) {
                existing.remove();
            }
            
            // 创建新toast
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            // 1.5秒后消失
            setTimeout(function() {
                toast.classList.add('hiding');
                setTimeout(function() {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 300);
            }, 1500);
        }
        
        function updateBeijingTime() {
            var timeEl = document.getElementById('beijingTime');
            if (!timeEl) return;
            
            var now = new Date();
            var options = { 
                timeZone: 'Asia/Shanghai', 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            timeEl.textContent = now.toLocaleTimeString('zh-CN', options);
        }
        
        function updateGreeting(name) {
            var el = document.getElementById('userGreeting');
            if (el) el.textContent = '你好，' + name;
        }
        
        function showMainApp() {
            var authScreen = document.getElementById('authScreen');
            var mainApp = document.getElementById('mainApp');
            
            if (authScreen) authScreen.style.display = 'none';
            if (mainApp) mainApp.style.display = 'flex';
        }
        
        function initAuth() {
            var inviteInput = document.getElementById('inviteCode');
            var verifyInput = document.getElementById('verifyCode');
            var authBtn = document.getElementById('authBtn');
            
            if (!inviteInput || !authBtn) {
                console.error('Auth elements not found');
                return;
            }
            
            // 输入邀请码时显示验证码输入框
            inviteInput.addEventListener('input', function(e) {
                if (e.target.value === '8888') {
                    verifyInput.classList.remove('hidden');
                    verifyInput.focus();
                }
            });
            
            // 点击进入按钮
            authBtn.addEventListener('click', function() {
                var invite = inviteInput.value;
                var verify = verifyInput ? verifyInput.value : '';
                
                if (invite === '8888') {
                    showMainApp();
                    
                    if (verify === '0812') {
                        localStorage.setItem('ambrose_user_identity', 'boss');
                        updateGreeting('BOSS Shao');
                    } else {
                        localStorage.setItem('ambrose_user_identity', 'guest');
                        updateGreeting('朋友');
                    }
                } else {
                    inviteInput.style.borderColor = '#FF2D92';
                    setTimeout(function() {
                        inviteInput.style.borderColor = '';
                    }, 1000);
                }
            });
            
            // 回车键支持
            inviteInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') authBtn.click();
            });
            if (verifyInput) {
                verifyInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') authBtn.click();
                });
            }
        }
        
        function initActions() {
            // 快捷操作按钮
            var actionMap = {
                'weight': '记录体重',
                'food': '记录饮食',
                'exercise': '记录运动',
                'sleep': '记录睡眠'
            };
            
            document.querySelectorAll('.action-item').forEach(function(item) {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    var action = this.getAttribute('data-action');
                    var message = actionMap[action] || '功能开发中';
                    showToast(message);
                });
            });
            
            // 顶部按钮
            var healthBtn = document.getElementById('healthBtn');
            var settingsBtn = document.getElementById('settingsBtn');
            
            if (healthBtn) {
                healthBtn.addEventListener('click', function() {
                    showToast('健康中心');
                });
            }
            
            if (settingsBtn) {
                settingsBtn.addEventListener('click', function() {
                    showToast('设置');
                });
            }
        }
        
        function initNav() {
            document.querySelectorAll('.nav-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.nav-item').forEach(function(i) {
                        i.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    var page = this.getAttribute('data-page');
                    if (page !== 'home') {
                        showToast('页面开发中: ' + page);
                    }
                });
            });
        }
        
        function initApp() {
            if (window.appInitialized) {
                console.log('App already initialized');
                return;
            }
            window.appInitialized = true;
            
            console.log('Initializing AMBROSE...');
            
            try {
                // 检查登录状态
                var identity = localStorage.getItem('ambrose_user_identity');
                if (identity) {
                    showMainApp();
                    updateGreeting(identity === 'boss' ? 'BOSS Shao' : '朋友');
                }
                
                // 初始化各模块
                initAuth();
                initActions();
                initNav();
                
                // 时间更新
                updateBeijingTime();
                setInterval(updateBeijingTime, 1000);
                
                console.log('AMBROSE initialized successfully');
            } catch (e) {
                console.error('App init error:', e);
            }
        }
        
        // 启动应用
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
