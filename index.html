<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AMBROSE - AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* 顶部 */
        .header {
            background: #07c160;
            color: white;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 600;
        }
        
        .header-status {
            width: 8px;
            height: 8px;
            background: #95ec69;
            border-radius: 50%;
            margin-left: 8px;
        }
        
        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }
        
        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: #e1e1e1;
        }
        
        .message.user .avatar {
            background: #07c160;
        }
        
        .bubble {
            max-width: 70%;
            margin: 0 10px;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        
        .message.user .bubble {
            background: #95ec69;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .bubble {
            background: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .bubble .text {
            color: #000;
        }
        
        .bubble .time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }
        
        /* 加载动画 */
        .loading-msg .bubble {
            display: flex;
            gap: 4px;
            padding: 15px 20px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* 输入区域 */
        .input-area {
            background: #f7f7f7;
            border-top: 1px solid #e1e1e1;
            padding: 10px 16px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .input-box {
            flex: 1;
            background: white;
            border: 1px solid #e1e1e1;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 40px;
            max-height: 100px;
            line-height: 20px;
        }
        
        .send-btn {
            width: 60px;
            height: 40px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
        }
        
        .send-btn:disabled {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-title">AMBROSE</span>
            <span class="header-status"></span>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <textarea class="input-box" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="chat.js"></script>
    <script>
        // 初始化身份验证
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init();
        });
    </script>
</body>
</html>
